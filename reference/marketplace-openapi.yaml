          example: false
        license_plate:
          type: string
        token:
          type: string
          readOnly: true
        locale:
          $ref: "#/components/schemas/LocaleForUser"
        device_info:
          $ref: "#/components/schemas/DeviceInfo"
        created_at:
          example: 1631558908
          type: integer
          format: int32
          readOnly: true
        updated_at:
          example: 1631558908
          type: integer
          format: int32
          readOnly: true

    SocialLoginProvider:
