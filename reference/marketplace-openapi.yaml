          type: string
          enum: [employee, space, both, neither]
          description: For this event type, does the customer select the employee/space or is it selected automatically at random?
        service_needs:
          type: string
          enum: [employee, space, both]
          description: For this event type, what does the service need to be booked?
        booking_question:
          type: string
          description: Deprecated, use `booking_questions` instead.
          deprecated: true
        booking_questions:
          $ref: "#/components/schemas/BookingQuestions"
        booking_success_message:
          type: string
          description: For a successful booking, this message is displayed for each event type booked.
          example: Remember to bring your smile with you!
        marketplace:
          type: boolean
          description: |
            Whether this event type is available in the marketplace.

            `true` - The event type is available in the marketplace.

            `false` - The event type is not available in the marketplace.

