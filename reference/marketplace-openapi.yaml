        pending_payment_details:
          $ref: "#/components/schemas/PendingPaymentDetails"
        ticket_id:
          type: string
          readOnly: true
          example: "A3B7C2K9"
          description: |
            A human-readable ticket ID for events created from scheduled events.
            Can be used for manual check-in of guests.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
