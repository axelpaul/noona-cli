        min_move_notice:
          type: integer
          format: int32
          description: Determine the minimum notice where clients can move their appointments
        location:
          $ref: "#/components/schemas/Location"
        booking_redirect_url:
          type: string
          description: A website the user is shown at the end of a successful booking.
        web_auth_opt_out:
