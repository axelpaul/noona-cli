  /v1/marketplace/enterprises:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      summary: List enterprises
      description: |
        Retrieves all enterprises, and their companies, accessible on the Noona marketplace.

        Navigation of the data; filtering, sorting, pagination etc. is based on the company.

        Using this endpoint opposed to **/companies** has the advantage of returning companies grouped within their respective enterprises.
      parameters:
        - in: query
          name: filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyFilter"
        - name: sort
          in: query
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          required: false
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanySort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
        - $ref: "#/components/parameters/search"
        - name: sort_by
          in: query
          description: Use sort instead.
          deprecated: true
          required: false
          schema:
            type: string
            enum: [popular, distance]
        - name: lat
          in: query
          required: false
          deprecated: true
          description: Use filter instead.
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: false
          deprecated: true
          description: Use filter instead.
          schema:
            type: number
            format: double
        - name: radius
          in: query
          required: false
          deprecated: true
          description: Use filter instead.
          schema:
            type: integer
            format: int64
            default: 100000
        - name: enterprise_ids
          in: query
          required: false
          description: Use filter instead.
          deprecated: true
          schema:
            type: array
            example: ["te7da9wd8ua28a1ab", "xa7da9wd8ua01a134"]
            items:
              type: string
        - name: company_type_id
          in: query
          description: Use filter instead.
          required: false
          deprecated: true
          schema:
            type: string
        - name: limit_companies
          in: query
          description: Use pagination object instead.
          deprecated: true
          required: false
          schema:
            type: integer
            format: int64
        - name: skip_companies
          in: query
          description: Use pagination object instead.
          deprecated: true
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterprisesExpanded"
          description: Enterprises
      operationId: ListEnterprises
      tags:
        - Marketplace Enterprises

