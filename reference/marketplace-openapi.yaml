          type: string
          example: "<html><body><h1>Hello, world!</h1></body></html>"

    PaymentActionCardinalChallenge:
      type: object
      description: |
        3DS challenge data for Verifone payments. The frontend must hand these
        fields to Cardinal.continue('cca', {...}) so Cardinal.js (Songbird) can
        manage the challenge iframe and receive the CRes through the
        payments.validated event. Do not POST the form manually — the CRes will
        go to Cardinal's TermURL and fail without Cardinal context.
      properties:
        type:
          type: string
          format: enum
          enum: [cardinal_challenge]
        acs_url:
          type: string
          description: ACS URL from Verifone 3DS lookup.
        payload:
          type: string
          description: creq payload (base64) from Verifone 3DS lookup.
        transaction_id:
          type: string
          description: ACS transaction ID — pass as TransactionId to Cardinal.continue.
        payment_id:
          type: string
          description: Our payment ID — use to poll status after payments.validated fires.

