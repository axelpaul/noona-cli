      properties:
        payment:
          $ref: "#/components/schemas/PaymentInformation"

    VoucherFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        relationship:
          $ref: "#/components/schemas/VoucherRelationship"
        omit_fully_used:
          type: boolean
          example: true
          default: false
          description: |
            Whether to omit vouchers that are fully used.

            `true` - Omit vouchers that are fully used.

            `false` - Include vouchers that are fully used.

