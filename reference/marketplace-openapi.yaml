      properties:
        battery_level:
          type: number
          format: double
          example: 0.72
        brand:
          type: string
          example: Apple
        build_number:
          type: string
          example: 1626691095
        carrier:
          type: string
          example: Vodafone
        device_id:
          type: string
          example: iPhone13,1
        device_name:
          type: string
          example: John's iPhone
        manufacturer:
          type: string
          example: Apple
        model:
          type: string
          example: "iPhone 12 mini"
        system_version:
          type: string
          example: "15.0.1"
        is_emulator:
          type: boolean
        readable_version:
          type: string
          example: 1.4.1.1626691095
        android_api_level:
          type: number
        code_push_app_version:
          type: string
          example: 1.4.1_v74

    Cards:
      type: array
      items:
        $ref: "#/components/schemas/Card"

    Card:
      type: object
      required:
        - pan
        - expiry_month
        - expiry_year
        - cvc
        - method
        - return_url
        - channel
      properties:
        method:
          type: string
          format: enum
          enum: ["Card"]
        id:
          example: 7awdXwZoedakjad37a
          type: string
          readOnly: true
        cardholder_name:
          type: string
          example: "Dee Hock"
        pan:
          example: "1564854695481453"
          type: string
          writeOnly: true
        masked_pan:
          example: "1564854695481453"
          type: string
          readOnly: true
        expiry_month:
          example: "02"
          type: string
        expiry_year:
          example: "02"
          type: string
        cvc:
          example: "070"
          type: string
          writeOnly: true
        temporary:
          type: boolean
          description: |
            Whether the card is temporary or not. A temporary card is only valid for a short amount of time and can only be used once.
        type:
          example: "visa"
          type: string
          format: enum
          enum: [visa, mastercard, other]
          readOnly: true
        provider:
          $ref: "#/components/schemas/PaymentProviderType"
        save_card:
          example: true
          type: boolean
          description: |
            Whether the card should be saved for future use.

            If the card is saved, it can be used for future payments without having to enter the card details again.
        return_url:
          type: string
          description: |
            If provided, the user is redirected to this URL after the payment is processed.

            This is required for 3D Secure payments.
        browser_information:
          $ref: "#/components/schemas/PaymentBrowserInformation"
        channel:
          $ref: "#/components/schemas/PaymentChannel"
        device_info_id:
          type: string
          description: |
            Session ID from Cardinal.js (Songbird) device fingerprinting.
            Required for Verifone 3D Secure payments.
        three_ds2_sdk_version:
          type: string
        PARes:
          type: string
          description: |
            The `PARes` parameter from the 3D Secure flow.
        CRes:
          type: string
          description: |
            The `CRes` parameter from the 3D Secure flow.
        created_at:
          type: string
          format: date-time
          readOnly: true

    PaymentBrowserInformation:
      type: object
      writeOnly: true
      required:
        - language
        - color_depth
        - javascript_enabled
        - screen_width
        - screen_height
        - time_zone_offset
      properties:
        language:
          type: string
          example: "en-US"
        color_depth:
          type: integer
          format: int32
        javascript_enabled:
          type: boolean
        screen_width:
          type: number
          format: double
        screen_height:
          type: number
          format: double
        time_zone_offset:
          type: integer
          format: int32

    Vouchers:
      type: array
      items:
        $ref: "#/components/schemas/Voucher"

    Voucher:
      type: object
      required:
        - payment
        - company
      properties:
        id:
          example: 7awdXwZoedakjad37a
          type: string
          readOnly: true
        currency:
          type: string
          example: ISK
          readOnly: true
        amount:
          type: number
          format: double
          example: 3990
        voucher_template:
          $ref: "#/components/schemas/ExpandableVoucherTemplate"
        data:
          $ref: "#/components/schemas/VoucherData"
        color:
          type: string
          example: "#0f0f0f"
        message:
          type: string
          example: "You deserve to relax a bit!"
        is_gift:
          type: boolean
          example: true
        code:
          type: string
          example: "A328DB"
          description: 6 uppercase letters / numbers
          readOnly: true
        phone_country_code:
          type: string
          example: "354"
        phone_number:
          type: string
          example: "7134124"
          description: |
            If a phone number is provided, it receives news of the newly created voucher.

            This keeps the original owner, while send_to_user transfers it to a different user.
        send_to_user:
          $ref: "#/components/schemas/Phone"
        email:
          type: string
          example: test@testy.is
          description: If an email is provided, it receives news of the newly created voucher.
        user:
          $ref: "#/components/schemas/ExpandableUser"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        expiration:
          example: "2022-08-24T14:15:22Z"
          type: string
          format: date-time
          description: Vouchers expire after 3 years
          readOnly: true
        payment:
          $ref: "#/components/schemas/PaymentInformation"
        payment_information:
          $ref: "#/components/schemas/VoucherPaymentInformation"
        fully_used:
          type: boolean
          description: Whether the voucher has been fully used or not.
          readOnly: true
        original_owner:
          type: boolean
          description: Whether the voucher resides with the original owner or not.
          readOnly: true
        bought_by:
          type: string
          example: 7awdXwZoedakjad37a
          description: ID of the user who bought the voucher.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    VoucherCreateRequest:
      type: object
      required:
        - company_id
