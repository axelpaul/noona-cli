components:
  securitySchemes:
    Marketplace-Authentication:
      type: apiKey
      in: header
      name: Authorization
      description: |
        The Noona Marketplace API uses an Authorization header with JWT Bearer tokens to authenticate marketplace users.

  responses:
    UnauthorizedError:
      description: API key is missing or invalid. See Authentication documentation for more information.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    UnauthorizedBasicError:
      description: Basic authentication failed. See Authentication documentation for more information.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    BadRequestError:
      description: Provided request body is malformed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    PermissionDenied:
      description: Operation not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    AlreadyExists:
      description: Item already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFoundError:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    PaymentError:
      description: Payment error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentError"

  parameters:
    select:
      name: select
      in: query
      description: "[Field Selector](https://api.noona.is/docs/working-with-the-apis/select)"
      required: false
      schema:
        type: array
        items:
          type: string

    expand:
      name: expand
      in: query
      description: "[Expandable attributes](https://api.noona.is/docs/working-with-the-apis/expandable_attributes)"
      required: false
      schema:
        type: array
        items:
          type: string

    search:
      name: search
      in: query
      description: "[Search](https://api.noona.is/docs/working-with-the-apis/search)"
      required: false
      schema:
        type: string

    user_location:
      name: location
      in: query
      description: "[Location](https://api.noona.is/docs/working-with-the-apis/location)"
      # This is required, but there is a bug in Orval client while handling required + content
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserLocation"

    time_slot_type:
      name: type
      in: query
      required: false
      schema:
        type: string
        default: "available"
        description: |
          Filter by type of time slots to return.

          `available` will only return slots with resources available.

          `unavailable` will only return slots with resources unavailable.

          `all` will return all slots.
        enum:
          - available
          - unavailable
          - all

  schemas:
    EnterpriseConnections:
      type: object
      properties:
        url_name:
          description: Used when constructing the marketplace url for the enterprise
          type: string
          example: noonacuts
        allows_booking_without_auth:
          description: Controls whether customers can make appointments without authentication
          type: boolean
          example: true
        marketplace:
          $ref: "#/components/schemas/EnterpriseConnectionsMarketplace"

    EnterpriseConnectionsMarketplace:
      type: object
      properties:
        enable_vouchers:
          type: boolean
          example: true

    EnterpriseProfile:
      type: object
      properties:
        name:
          type: string
          example: Noonacuts
        image:
          $ref: "#/components/schemas/Image"
        cover_images:
          $ref: "#/components/schemas/Images"

    EnterprisesExpanded:
      type: array
      items:
        $ref: "#/components/schemas/EnterpriseExpanded"

    EnterpriseExpanded:
      allOf:
        - $ref: "#/components/schemas/Enterprise"
        - type: object
          properties:
            favorites:
              type: integer
              format: int32
              description: The highest amount of favorites a company in this enterprise has.
            companies:
              $ref: "#/components/schemas/Companies"

    Enterprises:
      type: array
      items:
        $ref: "#/components/schemas/Enterprise"

    Enterprise:
      type: object
      properties:
        id:
          type: string
          example: aqmzX9Cm5tekKecsA
          readOnly: true
        companies:
          type: array
          readOnly: true
          description: An array of companies belonging to enterprise.
          items:
            type: string
        connections:
          $ref: "#/components/schemas/EnterpriseConnections"
        profile:
          $ref: "#/components/schemas/EnterpriseProfile"

    ExpandableEnterprise:
      description: "[Expandable](#section/Expandable-attributes)"
      oneOf:
        - $ref: "#/components/schemas/ID"
        - $ref: "#/components/schemas/Enterprise"

    ExpandableCompanyType:
      description: "[Expandable](#section/Expandable-attributes)"
      oneOf:
        - $ref: "#/components/schemas/ID"
        - $ref: "#/components/schemas/CompanyType"

    CompanyTypes:
      type: object
      properties:
        company_types:
          type: array
          items:
            $ref: "#/components/schemas/CompanyType"

    CompanyType:
      type: object
      properties:
        id:
          example: 7awdXwZoedakjad37a
          type: string
        name:
          type: string
          example: Hair salons
        promotion:
          type: string
          example: "Did you know you can book a haircut on Noona?"
        locale_key:
          type: string
          example: hairstyling
        image:
          type: string
          example: https://api.noona.is/static/haircut.png
        public_id:
          type: string
          example: https://placekitten.com/200/300

    ExpandableCompany:
      description: "[Expandable](#section/Expandable-attributes)"
      oneOf:
        - $ref: "#/components/schemas/ID"
        - $ref: "#/components/schemas/Company"

    CompanyFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        vertical:
          $ref: "#/components/schemas/CompanyVertical"
        company_type_id:
          type: string
          example: 7awdXwZoedakjad37a
          description: ID of the company type (category).
        cuisines:
          type: array
          items:
            type: string
          description: |
            Only return companies with cuisine in the provided array.

            The array should contain ids of cuisines.

            Example: ["id-1", "id-2"]

            If nothing is provided, all cuisines are returned.
        cuisine_readable_ids:
          type: array
          items:
            type: string
          description: |
            Only return companies with cuisine in the provided array.

            The array should contain readable ids of cuisines.

            Example: ["italian", "japanese"]

            If nothing is provided, all cuisines are returned.
        dietaries:
          type: array
          items:
            type: string
          description: |
            Only return companies with dietary restrictions in the provided array.

            The array should contain ids of dietaries.

            Example: ["id-1", "id-2"]

            If nothing is provided, all dietary restrictions are returned.
        dietary_readable_ids:
          type: array
          items:
            type: string
          description: |
            Only return companies with dietary restrictions in the provided array.

            The array should contain readable ids of dietaries.

            Example: ["vegan", "vegetarian"]

            If nothing is provided, all dietary restrictions are returned.
        ambiences:
          type: array
          items:
            type: string
          description: |
            Only return companies with ambience in the provided array.

            The array should contain ids of ambiences.

            Example: ["id-1", "id-2"]

            If nothing is provided, all ambience types are returned.
        ambience_readable_ids:
          type: array
          items:
            type: string
          description: |
            Only return companies with ambience in the provided array.

            The array should contain readable ids of ambiences.

            Example: ["romantic", "family"]

            If nothing is provided, all ambience types are returned.
        price:
          type: array
          items:
            type: integer
            format: int32
          description: |
            Only return companies with price category in the provided array.

            The array should contain integers between 1 and 4.

            Example: [1, 2, 3]

            If nothing is provided, all price categories are returned.
        enterprise_ids:
          type: array
          items:
            type: string
          description: Only return enterprises with specified ids.
        only_voucher_companies:
          type: boolean
          description: Only return companies that accept vouchers.
        onboarded_marketplace_after:
          type: string
          format: date-time
          description: Only return companies that enabled marketplace after the provided date.
        only_with_cover_images:
          type: boolean
          description: Only return companies with cover images.
        lat:
          type: number
          format: double
          description: Latitude of the location to search around.
        lng:
          type: number
          format: double
          description: Longitude of the location to search around.
        radius:
          type: integer
          format: int64
          default: 10000
          description: |
            Only return companies within radius of lat/lng in **meters**.

            If latitude and longitude are not provided the radius has no effect.

    OpeningHourFilter:
      type: object
      description: |
        [Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)

        Date range must be less than a year.
      properties:
        from:
          type: string
          example: "2020-08-24"
        to:
          type: string
          example: "2020-09-24"

    MapCompanyFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        vertical:
          $ref: "#/components/schemas/CompanyVertical"
        service_types:
          type: array
          items:
            type: string
          description: |
            Only return companies with service type in the provided array.

            The array should contain ids of service types.

            Example: ["id-1", "id-2"]

            If nothing is provided, all service types are returned.
        cuisines:
          type: array
          items:
            type: string
          description: |
            Only return companies with cuisine in the provided array.

            The array should contain ids of cuisines.

            Example: ["id-1", "id-2"]

            If nothing is provided, all cuisines are returned.
        dietaries:
          type: array
          items:
            type: string
          description: |
            Only return companies with dietary restrictions in the provided array.

            The array should contain ids of dietaries.

            Example: ["id-1", "id-2"]

            If nothing is provided, all dietary restrictions are returned.
        price:
          type: array
          items:
            type: integer
            format: int32
          description: |
            Only return companies with price category in the provided array.

            The array should contain integers between 1 and 4.

            Example: [1, 2, 3]

            If nothing is provided, all price categories are returned.

    CompanyVertical:
      type: string
      format: enum
      enum:
        - appointment
        - restaurant

    Company:
      type: object
      properties:
        id:
