    Employee:
      type: object
      properties:
        id:
          type: string
          example: 7dj29KiAE1wdjw731
        profile:
          $ref: "#/components/schemas/EmployeeProfile"
        marketplace:
          type: boolean
          description: Whether the employee is visible on the marketplace or not.
          example: true
        event_type_preferences:
          type: array
          items:
            $ref: "#/components/schemas/EventTypePreference"
        exclude_from_randomization_pool:
          type: boolean
          description: Whether the employee should be excluded from the randomization pool or not.
        bookable:
          type: string
          format: enum
          enum: [not_bookable, bookable, existing_clients_only]
          description: |
            Indicates whether the employee is bookable for the currently authenticated user.

            - `not_bookable`: The employee cannot be booked by anyone at the moment.
            - `bookable`: The employee can be booked by the current user.
            - `existing_clients_only`: The employee can only be booked by existing clients. If the current user has not booked this employee before, they cannot book them now.
          example: "bookable"
