      type: array
      items:
        $ref: "#/components/schemas/EventTypeWithTimeSlots"

    EventTypeWithTimeSlots:
      type: object
      properties:
        event_type:
          $ref: "#/components/schemas/EventType"
        time_slots:
          $ref: "#/components/schemas/TimeSlots"
        capacity:
          type: integer
          format: int32
          description: The capacity (party size) these time slots were calculated for. Only present when min_capacity/max_capacity query params are used.

    TimeSlots:
      type: array
      items:
        $ref: "#/components/schemas/TimeSlot"

    TimeSlot:
      type: object
      properties:
        status:
          type: string
          format: enum
          enum:
            - closed
            - not_available
            - capacity
          description: |
            The status of the time slot. Can be used to provide further information to the user about the availability on this particular date.

            Possible values:
            - **empty/missing** - There is no constraint that prevents booking on this date
            - `closed` - The company is closed on this date
            - `not_available` - The company is open but this particular event_type is not available on this date
            - `capacity` - The number of guests does not match the constraints of the event_type (less then min or greated than max)
        date:
          type: string
          example: "2021-01-03"
        slots:
          type: array
          items:
            $ref: "#/components/schemas/Slot"
        unavailable_slots:
          type: array
          items:
            $ref: "#/components/schemas/Slot"

    Slot:
      type: object
      properties:
        time:
          type: string
          example: "08:00"
        employeeIds:
          type: array
          items:
            type: string
        spaceIds:
          type: array
          items:
            type: string
        timestamp:
          readOnly: true
          writeOnly: true
          type: string
          format: date-time
        unavailable_resources:
          readOnly: true
          writeOnly: true
          type: array
          description: "Details of the resources that are unavailable for this time slot, including the reason"
          items:
            $ref: "#/components/schemas/UnavailableResource"
        unavailable_employees:
          readOnly: true
          writeOnly: true
          type: array
          description: "Details of the employees that are unavailable for this time slot, including the reason"
          items:
            $ref: "#/components/schemas/UnavailableResource"

    UnavailableResource:
      type: object
      properties:
        resource:
          type: string
          description: "The ID of the unavailable resource"
        reason:
          type: string
          format: enum
          enum:
            - booked
            - outside_opening_hours
            - custom_booking_interval
            - capacity
          description: |
            The reason why the resource is unavailable.

            Possible values:
            - `booked` - The resource is booked during this time slot
            - `outside_opening_hours` - The reservation extends outside the opening hours of the company
            - `custom_booking_interval` - The reservation start time does not match the custom booking interval of the resource
            - `capacity` - The capacity of the resource does not match number of guests (Too big or too small)

            The above list of reasons is priority ordered. Meaning that if a table does not support number of guests due to
            capacity and is also booked, the reason will be `booked`.

