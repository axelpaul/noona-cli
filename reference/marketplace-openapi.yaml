        relative_location:
          $ref: "#/components/schemas/RelativeLocation"
        payment_provider:
          $ref: "#/components/schemas/PaymentProviderType"
        capabilities:
          $ref: "#/components/schemas/CompanyCapabilities"

    CompanyProfile:
