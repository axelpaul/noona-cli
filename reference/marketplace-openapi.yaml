        upsellable:
          type: boolean
          example: true
          description: |
            When true, only voucher templates that should be promoted to the user are returned.

    ListAllVoucherTemplatesFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        company_filter:
          $ref: "#/components/schemas/CompanyFilter"
        voucher_type:
          $ref: "#/components/schemas/VoucherType"
        sessions_total:
          type: integer
          format: int32
          example: 5
          description: |
            Only return voucher templates with a sessions total equal to the provided value.
        sessions_total_gte:
          type: integer
          format: int32
          example: 5
          description: |
            Only return voucher templates with a sessions total greater than or equal to the provided value.
        has_value:
          type: boolean
          example: true
          description: |
            Only return voucher templates where the voucher's value exceeds its amount (i.e., vouchers that offer more value than their cost).

    VoucherTemplates:
      type: array
      items:
        $ref: "#/components/schemas/VoucherTemplate"

    VoucherTemplate:
      type: object
      properties:
        id:
          example: 7awdXwZoedakjad37a
          type: string
          readOnly: true
        type:
          $ref: "#/components/schemas/VoucherType"
        title:
          type: string
          example: "Voucher for the men's haircut"
        description:
          type: string
          example: "Please note that the voucher is only valid between 10:00 and 14:00, Monday to Friday."
        marketplace_description:
          type: string
          example: A short form description displayed on the Noona marketplace.
        event_type:
          $ref: "#/components/schemas/ExpandableEventType"
        variation_id:
          type: string
          description: The ID of the event type variation that the value of the voucher should be calculated from.
          example: 7awdXwZoedakjad37a
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        number_of_guests:
          type: integer
          format: int32
          example: 2
          default: 1
          description: The number of people this voucher is valid for.
        currency:
          type: string
          example: ISK
        amount:
          type: number
          format: double
          example: 10000
        value:
          type: number
          format: double
          example: 12500
        expiration_months_after_purchase:
          type: integer
          format: int32
          example: 12
          default: 48
        images:
          $ref: "#/components/schemas/Images"
        preview_image:
          $ref: "#/components/schemas/Image"
        primary_color:
          type: string
          example: "#0f0f0f"
        sessions_total:
          type: integer
          format: int32
          example: 5
        is_promoted:
          type: boolean
          description: |
            Whether the voucher template is promoted to the top of the voucher templates list.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    VoucherType:
      type: string
      format: enum
      enum: ["amount", "service"]

    SpeedySlots:
      type: array
      items:
        $ref: "#/components/schemas/SpeedySlot"

    SpeedySlot:
      type: object
      properties:
        company:
          $ref: "#/components/schemas/Company"
        event_types:
          $ref: "#/components/schemas/EventTypesWithTimeSlots"

    SpeedySlotsSearchFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      required:
        - lat
        - lng
      properties:
        lat:
          type: number
          format: double
          description: Latitude of the location to search around.
        lng:
          type: number
          format: double
          description: Longitude of the location to search around.
        radius:
          type: integer
          format: int64
          default: 10000
          description: |
            Only return services of companies within radius of lat/lng in **meters**.

            If latitude and longitude are not provided the radius has no effect.

    SpeedyTablesSearchFilter:
      allOf:
        - $ref: "#/components/schemas/SpeedySlotsSearchFilter"
        - type: object
          description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
          properties:
            cuisines:
              type: array
              items:
                type: string
              description: |
                Only return companies with cuisine in the provided array.

                The array should contain ids of cuisines.

                Example: ["id-1", "id-2"]

                If nothing is provided, all cuisines are returned.
            dietaries:
              type: array
              items:
                type: string
              description: |
                Only return companies with dietary restrictions in the provided array.

                The array should contain ids of dietaries.

                Example: ["id-1", "id-2"]

                If nothing is provided, all dietary restrictions are returned.
            price:
              type: array
              items:
                type: integer
                format: int32
              description: |
                Only return companies with price category in the provided array.

                The array should contain integers between 1 and 4.

                Example: [1, 2, 3]

                If nothing is provided, all price categories are returned.

    PaylinkPayment:
      type: object
      description: |
