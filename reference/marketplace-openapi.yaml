  /v1/marketplace/vouchers:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - Marketplace-Authentication: []
      summary: List vouchers
      description: Lists the vouchers of a marketplace user.
      parameters:
        - name: sort
          in: query
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
        - in: query
          name: filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherFilter"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vouchers"
          description: Vouchers
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: ListVouchers
      tags:
        - Vouchers
    post:
      security:
        - Marketplace-Authentication: []
      summary: Create a voucher
      description: |
        Creates a voucher for a marketplace user.

        There are two voucher types that are supported:

        - Amount
        - Service

        **company** and **payment** are always required fields. But depending on the voucher type, additional fields are required.

        ---
        #### Amount
        Amount vouchers represent a monetary value that can be used to pay for services at a company.

        The following fields are required when creating an amount voucher:

        - **amount** - The amount of the voucher.
        - **currency** - The currency of the voucher.

        #### Service (event_type)
        Service vouchers represent a service that can be redeemed at a company.

        The following fields are required when creating a service voucher:

        - **voucher_template** - The voucher template ID. This is the template that will be used to create the voucher.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Voucher"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
          description: Voucher
        "400":
          $ref: "#/components/responses/PaymentError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      operationId: CreateVoucher
      tags:
        - Vouchers

  /v2/marketplace/vouchers:
    parameters:
