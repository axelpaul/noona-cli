openapi: 3.0.2
x-json-schema-faker:
  maxItems: 2
info:
  description: |
    # Overview

    Noona provides a powerful REST(y) API that focuses on simplicity and clarity.

    - All API requests must be made over HTTPS. Calls made over plain HTTP will be redirected to HTTPS.

    **Base Path**
    ```
    https://api.noona.is
    ```

    The Marketplace API allows various 'customer' interactions with the companies in the Noona ecosystem.

    Example user: **An individual seeking a haircut**.

  title: Noona Marketplace API
  version: dev
  x-logo:
    url: https://api.noona.is/docs/img/logo_black.svg

servers:
  - url: https://api.noona.is

x-tagGroups:
  - name: User
    tags:
      - Marketplace User
      - Customers
      - Cards
      - Payments
      - Vouchers
      - Suggestions
      - Recommendations
  - name: Service Providers
    tags:
      - Marketplace Enterprises
      - Marketplace Companies
      - Categories
      - Employees
      - Spaces
      - Event Types
      - Event Type Categories
      - Marketplace Events
      - Time Slots
      - Voucher Templates
      - Waitlists
      - Booking Offers
      - Items

tags:
  - name: Categories
    description: |
      Categories are used to group and categorize companies.
  - name: Marketplace Companies
    x-displayName: Companies
    description: |
      Companies are individual service providers such as **Hair salons**, **Chiropractors** and **Veterinarians**.
  - name: Employees
    description: |
      Employees are individuals that perform services at a given company.
  - name: Spaces
    description: |
      Spaces are areas where services are performed at a given company.
  - name: Marketplace User
    x-displayName: User
    description: Everything about the logged in marketplace user.
  - name: Events
    description: |
      Events are the center point of our whole system.

      A haircut that an HQ user performs on some marketplace user at a specified time is an event.
  - name: Marketplace Events
    x-displayName: Events
    description: |
      Events are the center point of our whole system.

      A haircut that an HQ user performs on some marketplace user at a specified time is an event.
  - name: Event Types
    description: |
      Event Types describe the different services a company offers.
  - name: Event Type Categories
    description: |
      Event Type Categories are used to group and categorize event types.

      This is useful since a company might call a haircut a **Haircut** and another company might call it a **Hair styling**.
  - name: Marketplace Enterprises
    x-displayName: Enterprises
    description: An enterprise is an umbrella entity which purpose is maintaining a relation between multiple companies.
  - name: Time Slots
    description: |
      Time Slots are points in time when a company can provide a specified service.
  - name: Vouchers
    description: |
      Vouchers are purchased through the marketplace and can be used to pay for a service at an enterprise.
  - name: Cards
    description: |
      Cards are debit/credit cards that a marketplace user has saved for future use.
  - name: Suggestions
    description: |
      Suggestions are user specific suggestions - based on trivial things like booking history etc.
  - name: Recommendations
    description: |
      Recommendations are user specific recommendations - based on machine learning algorithms and models.
  - name: Payments
    description: |
      Payments are the result of a marketplace user paying for a service.
  - name: Customers
    description: |
      A customer is the HQ view of a marketplace user.
  - name: Voucher Templates
    description: |
      Voucher templates are predefined templates that enable a fast creation of vouchers.
  - name: Waitlists
    description: |
      Waitlist are a way to manage a queue of users waiting for a service.
  - name: Booking Offers
    description: |
      Booking offers are suggestions made to a marketplace user for a specific service at a specific time.
  - name: Items
    description: |
      Items are marketplace listings such as scheduled events.

paths:
  /v1/marketplace/companies/{id}/time_slots:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      summary: List time slots
      description: |
        Gets all available tima slots for company based on filter.

        Either **event_type_ids** or **event_id** must be provided.

        Capacity is the number of customers in booking.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "aw7da9wd8ua28a821"
            description: "Company ID"
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            example: "8a1da9wd8ua28aa9d"
        - name: space_id
          in: query
          required: false
          schema:
            type: string
            example: "ea7da9wd8ua28a134"
        - name: event_type_ids
          in: query
          required: false
          schema:
            type: array
            example: ["te7da9wd8ua28a1ab", "xa7da9wd8ua01a134"]
            items:
              type: string
        - name: event_id
          in: query
          required: false
          schema:
            type: string
            example: "xa7da9wd8ua01a134"
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-31"
        - name: capacity
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 5
            default: 1
        - $ref: "#/components/parameters/time_slot_type"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSlots"
          description: Time slots
      operationId: ListTimeSlots
      tags:
        - Time Slots

  /v1/marketplace/companies/{id}/multiple_time_slots:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      summary: List multiple time slots
      description: |
        Gets all available tima slots for company based on filter for multiple event types.

        This endpoint allows for fetching time slots for multiple event types at once.
        Opposed to **/time_slots** which only allows for fetching time slots for a single event type.

        If **event_id** is provided, **event_type_ids** will be ignored and the event type of the event will be used.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "aw7da9wd8ua28a821"
            description: "Company ID"
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            example: "8a1da9wd8ua28aa9d"
        - name: space_id
          in: query
          required: false
          schema:
            type: string
            example: "ea7da9wd8ua28a134"
        - name: event_type_ids
          in: query
          required: false
          schema:
            type: array
            example: ["te7da9wd8ua28a1ab", "xa7da9wd8ua01a134"]
            items:
              type: string
        - name: event_id
          in: query
          required: false
          schema:
            type: string
            example: "xa7da9wd8ua01a134"
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-31"
        - name: capacity
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 5
            default: 1
        - name: min_capacity
          in: query
          required: false
          description: Minimum party size for capacity range query. Must be used together with max_capacity.
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 2
        - name: max_capacity
          in: query
          required: false
          description: Maximum party size for capacity range query. Must be used together with min_capacity.
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 5
        - $ref: "#/components/parameters/time_slot_type"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventTypesWithTimeSlots"
          description: Time slots
      operationId: ListMultipleTimeSlots
      tags:
        - Time Slots

  /v1/marketplace/company_types:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      summary: List all company types
      description: |
        List all company types and metadata about company types.

        Providing a **latitude** and **longitude** causes results to be specific to the relevant country.
      parameters:
        - name: sort
          in: query
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Longitude
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Latitude
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTypes"
          description: Company types and metadata
      operationId: ListCompanyTypes
      tags:
        - Categories

