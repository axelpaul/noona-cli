        booking_question_answers:
          $ref: "#/components/schemas/BookingQuestionAnswers"
        comment:
          type: string
          example: "I have blonde hair"
        origin:
          type: string
          example: "online"
        channel:
          type: string
          example: "google maps"
        source:
          type: string
          example: "quick bookings"
        partner:
          type: string
          description: The identifier for the partner system that created the event.
        no_show_acknowledged:
          type: boolean
          example: false
        event_types:
          $ref: "#/components/schemas/EventTypes"
        variation_selections:
          $ref: "#/components/schemas/VariationSelections"
        confirmed:
          type: boolean
          description: Whether the event has been confirmed by the company.
          example: true
          readOnly: true
        status:
          writeOnly: true
          type: string
          format: enum
          enum: ["cancelled"]
          example: "cancelled"
          description: The status of the event. Cancelled events are not returned in list of events.
        rrule:
          type: string
          example: "FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,TU,WE,TH,FR"
          readOnly: true
        cancel_reason:
          writeOnly: true
          type: string
          example: "I'm sick and can't make it"
          description: Should be provided if the status is being updated to cancelled.
        employee:
          $ref: "#/components/schemas/ExpandableEmployee"
        space:
          $ref: "#/components/schemas/ExpandableSpace"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        scheduled_event:
