        ui_language:
          type: string

    LocaleForCompany:
      type: object
      properties:
        ui_language:
          type: string
        messaging_language:
          type: string
          description: Outgoing messages language such as emails, push notifications, SMS

    Sort:
      type: object
      properties:
        field:
          type: string
        order:
          type: string
          enum: [asc, desc]
        ignore_casing:
          type: boolean
          default: false
          description: |
            When true, use case-insensitive sorting for string fields.
            Note: This may prevent the use of indexes for sorting operations impacting performance.

    CompanySort:
      type: object
      properties:
        field:
          type: string
          description: |
            All fields can be used for sorting, along with these special fields:
            - `popular` - Sorts companies by favorite count.
            - `distance` - Sorts companies by distance from the provided location.
            - `onboarded_marketplace` - Sorts companies by when they were onboarded to the marketplace.
            - `enterprise_order` - Sorts companies by their custom order within their enterprise.

            Order is ignored when a special field is used.
        order:
          type: string
          enum: [asc, desc]

    EventTypeSearchFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        company_type:
          type: string
          example: 7awdXwZoedakjad37a
          description: Returns only event types valid for the company type.
        lat:
          type: number
          format: double
          description: Latitude of the location to search around.
        lng:
          type: number
          format: double
          description: Longitude of the location to search around.
        radius:
          type: integer
          format: int64
          default: 10000
          description: |
            Only return services of companies within radius of lat/lng in **meters**.

            If latitude and longitude are not provided the radius has no effect.

    EventTypeFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        employee_id:
          type: string
          example: 7awdXwZoedakjad37a
          description: Returns only event types valid for the employee.
        event_type_ids:
          type: array
          description: Only return specified event types.
          items:
            type: string

    EventTypes:
      type: array
      items:
        $ref: "#/components/schemas/EventType"

    EventType:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: 7awdXwZoedakjad37a
        title:
          type: string
          example: Men's haircut
        company_id:
          type: string
          example: 831dXwZoedakjad40b
          writeOnly: true
          readOnly: true
          deprecated: true
          description: Deprecated, use `company` instead.
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        minutes:
          type: integer
          format: int32
          example: 30
        description:
          type: string
          example: 30 minute men's haircut
        min_guests_per_booking:
          type: integer
          format: int32
          description: Minimum number of guests per booking. If this is not set on the event type, the company's default is used.
        max_guests_per_booking:
          type: integer
          format: int32
          description: Maximum number of guests per booking. If this is not set on the event type, the company's default is used.
        thumb:
          type: string
          description: Use images instead.
          example: api.noona.is/static/haircut.png
          deprecated: true
        images:
          $ref: "#/components/schemas/Images"
        variations:
          $ref: "#/components/schemas/EventTypeVariations"
        price_ranges:
          $ref: "#/components/schemas/EventTypePriceRanges"
        connections:
          $ref: "#/components/schemas/EventTypeConnections"
        payments:
          $ref: "#/components/schemas/EventTypePayments"
        pending_payment_details:
          $ref: "#/components/schemas/PendingPaymentDetails"
        pending_payment_details_required:
          $ref: "#/components/schemas/PendingPaymentDetails"
        pending_payment_details_full:
          $ref: "#/components/schemas/PendingPaymentDetails"
        relative_location:
          $ref: "#/components/schemas/RelativeLocation"
        created_at:
          example: 1631558908
          type: integer
          format: int32
          readOnly: true
        updated_at:
          example: 1631558908
          type: integer
          format: int32
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true

    EventTypePayments:
      type: object
      readOnly: true
      properties:
        pre_payment_enabled:
          type: boolean
          example: true
          description: |
            Is pre-payment enabled at all for the company?

            `true` - Other flags have meaning.

            `false` - Other flags are ignored.
        pre_payment_type:
          type: string
          format: enum
          enum: [payment, saved_card]
          default: payment
          example: payment
          description: |
            The type of pre-payment.

            - `payment` - The customer pays the pre-payment amount.
            - `saved_card` - The customer's card details are stored and the pre-payment amount is charged in case of a no-show.
        pre_payment_required:
          type: boolean
          example: true
          description: |
            Is any upfront payment required?

            `true` - pre_payment_ratio is used to indicate how much.

            `false` - pre_payment_ratio is ignored.
        pre_payment_min_pax:
          type: integer
          format: int32
          example: 1
          description: |
            The minimum number of people that must be associated with reservation so that pre-payment is required.
        flat_fee:
          type: integer
          format: int32
          example: 100000
          description: |
            The amount that must be paid in advance.

            If flat_fee is greater than 0 and pre_payment_ratio is set, flat_fee takes precedence.

            In the x100 format.
        pre_payment_ratio:
          type: integer
          format: int32
          example: 20
          minimum: 0
          maximum: 100
          description: How much of the total price must be paid in advance in %.
        optional_full_payment:
          type: boolean
          example: true
          description: |
            Is full payment optional?

            `true` - on_location_payment_amount can optionally be fully paid.

            `false` - no optional payment.
        pre_payment_amount:
          type: number
          format: double
          example: 2000
          description: How much must be paid in advance.
        optional_pre_payment_amount:
          type: number
          format: double
          example: 10000
          description: How much can optionally be paid in advance.
        on_location_payment_amount:
          type: number
          format: double
          example: 8000
          description: How much must be paid on location.  (Lower limit)
        on_location_payment_amount_upper_limit:
          type: number
          format: double
          example: 8000
          description: How much must be paid on location. (Upper limit)
          readOnly: true
        pre_payment_currency:
          type: string
          example: ISK
        total_payment:
          type: number
          format: double
          example: 10000
          description: Total price of the event type. (Lower limit)
        total_payment_upper_limit:
          type: number
          format: double
          example: 10000
          description: Total price of the event type. (Upper limit)
          readOnly: true

    RelativeLocation:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        distance:
          type: number
          format: double
          description: Distance in meters from user location (When applicable).

    EventTypePriceRanges:
      type: array
      items:
        type: object
        $ref: "#/components/schemas/EventTypePriceRange"

    EventTypePriceRange:
      type: object
      properties:
