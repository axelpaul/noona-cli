        specific_employee_requested:
          type: boolean
          description: Whether the user requested a specific employee or not.
          example: true
          readOnly: true
        specific_space_requested:
          type: boolean
          description: Whether the user requested a specific space or not.
          example: true
          readOnly: true
        booking_for_other:
          type: boolean
          example: false
          writeOnly: true
          description: |
            Whether the booking is for someone else.

            When `true` a customer ID can be passed in to use an existing customer.

            When `false` the default customer for this marketplace user at the specific company will be used, if one does not exist a new customer will be created.
        customer:
          type: string
          example: "7awdXwZoedakjad37a"
          description: |
            When booking for other. The customer ID of the person being booked for.

            If a customer ID is not provided, a new customer will be created.
          writeOnly: true
        payments:
          $ref: "#/components/schemas/EventTypePayments"
        payment_information:
          $ref: "#/components/schemas/PaymentInformation"
        payment:
