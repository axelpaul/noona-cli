  /v1/marketplace/companies/{company_id}/verifone/threeds_jwt:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      summary: Get Verifone 3DS JWT
      description: |
        Returns a JWT for initializing Cardinal.js (Songbird) 3DS device fingerprinting.
        Only available for companies with Verifone ecom payment provider configured.

        When `employee_id` is supplied and the employee has own Verifone ecom
        credentials configured (with own-settlements preferred and allowed), the JWT
        is minted from the employee's full Verifone account — userId, apiKey, AND
        3DS contract id. The 3DS contract is bound to a Verifone account, so when
        the charge will be routed to the employee's account the JWT must come from
        the same account. Otherwise the JWT is minted from the company's credentials.
      parameters:
        - name: company_id
          description: Company ID
          in: path
          required: true
          schema:
            type: string
        - name: employee_id
          description: |
            Optional employee ID. The frontend should pass the employee selected on the
            time slot reservation so the JWT is minted from the right Verifone account
            when the employee receives funds directly via own settlements.
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verifone3dsJwtResponse"
          description: JWT response
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: GetVerifoneThreedsJwt
      security:
        - Marketplace-Authentication: []
      tags:
        - Payments

  /v1/marketplace/payments/callbacks/3ds:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    post:
      summary: Receive 3ds callback
      description: |
        Receives a 3ds callback from Teya.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Teya3dsCallback"
      responses:
        "302":
          description: 3ds redirect
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: Receive3dsCallback
      tags:
        - Payments

