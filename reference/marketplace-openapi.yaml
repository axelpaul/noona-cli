          readOnly: true
          writeOnly: true
          description: Deprecated. Use `company_types` instead.
          items:
            type: string
            example: 8aj29KiAE1wdjw143
        company_types:
          type: array
          items:
            $ref: "#/components/schemas/ExpandableCompanyType"
        cuisines:
          $ref: "#/components/schemas/Categories"
        dietaries:
          $ref: "#/components/schemas/Categories"
        ambiences:
          $ref: "#/components/schemas/Categories"
        settings:
          $ref: "#/components/schemas/CompanySettings"
        image:
          $ref: "#/components/schemas/Image"
        cover_images:
          type: array
          description: The marketplace images displayed on a companies profile
          items:
            $ref: "#/components/schemas/Image"
        phone_country_code:
          type: string
