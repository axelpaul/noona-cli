    CompanyUpdate:
      allOf:
        - $ref: "#/components/schemas/Company"
        - $ref: "#/components/schemas/CompanyUpdateOverrides"

    AdminCompanyUpdate:
      allOf:
        - $ref: "#/components/schemas/Company"
        - $ref: "#/components/schemas/CompanyUpdateOverrides"
        - $ref: "#/components/schemas/AdminCompanyUpdateFields"

    AdminCompanyUpdateFields:
      type: object
      properties:
        noshow_claims_enabled:
          type: boolean
          description: Whether no-show claims are enabled for this company. When true, activates no-show subscription and requires SSN in marketplace. When false, deactivates no-show claims functionality. Only admins can modify this field.
        noshow_claimant_id:
          type: string
          description: The company's Icelandic national ID (kennitala) used as the claimant identity for no-show claims. Only admins can modify this field.
        verifone_ecom:
          $ref: "#/components/schemas/VerifoneEcomCredentials"
        teya_direct:
          $ref: "#/components/schemas/TeyaDirectCredentials"
        straumur_ecom:
          $ref: "#/components/schemas/StraumurEcomCredentials"
        phone_friendly:
          type: string
          description: Custom SMS sender name (phone-friendly name). Only alphanumeric characters (a-z, A-Z, 0-9) are allowed. Non-compliant characters are stripped before storage.
          maxLength: 10
          pattern: '^[a-zA-Z0-9]+$'
        trusted_sms_sender:
          type: boolean
          description: >
            Whether this company is trusted to send SMS messages containing
            non-whitelisted URLs or email addresses. Admin only.
        quotas:
          $ref: "#/components/schemas/AdminCompanyQuotas"
        flags:
          $ref: "#/components/schemas/CompanyFlags"

    AdminCompanyQuotas:
      type: object
      properties:
        direct_messages:
          type: integer
          format: int32
          minimum: 0
          description: Override limit for direct SMS messages
        marketing_messages:
          type: integer
          format: int32
          minimum: 0
          description: Override limit for marketing SMS messages

    CompanyFlags:
      type: object
      properties:
        fraudulent:
          type: boolean
          description: Whether this company is flagged as fraudulent
        test_company:
          type: boolean
          description: Whether this is a test company

    CompanyUpdateOverrides:
      type: object
      properties:
        vertical:
          readOnly: true
        currency:
          readOnly: true

    PaymentFees:
      type: object
      readOnly: true
      description: >
        Dynamic mapping of payment reasons to fees. Valid keys include "event", "paylink", "voucher", etc.,
        representing different reasons for payments. Each key maps to a fee represented as a floating-point number.
      additionalProperties:
        type: number
        format: double
      example:
        event: 0.019
        paylink: 0.019
        voucher: 0.05

    AdyenConnection:
      type: object
      readOnly: true
      properties:
        onboarded_at:
          type: string
          format: date-time
        onboarding_status:
          $ref: "#/components/schemas/AdyenOnboardingStatus"
        has_transfer_instrument:
          type: boolean
          description: Adyen transfer instrument is required for payouts to work

    TeyaConnection:
      type: object
      readOnly: true
      properties:
        connected:
          type: boolean
          example: true
          description: True if the user has an active oAuth connection to Teya
        has_token:
          type: boolean
          example: true
          description: True if the user has a token for Teya direct

    TeyaDirectCredentials:
      type: object
      description: >
        Teya Direct credentials used for direct payment processing. This block contains
        secret material — only admin endpoints return it. Public company/user responses
        must never include these fields. The `three_ds_enabled` field is only meaningful
        on company-level credentials and is ignored when set on user-level credentials.
      properties:
        token:
          type: string
          description: Teya Direct API token used for authenticated direct payment calls
        merchant_id:
          type: string
          description: Teya Direct merchant ID used for authenticated direct payment calls
        three_ds_enabled:
          type: boolean
          description: Whether 3-D Secure is enabled for Teya Direct payments. Company-level only.

    StraumurEcomCredentials:
      type: object
      description: >
        Straumur e-comm credentials used for online payment processing through the Straumur
        payment gateway. This block contains secret material — only admin endpoints return it.
        Public company/user responses must never include these fields.
      properties:
        api_key:
          type: string
          description: Straumur e-comm API key used for authenticated payment calls
        terminal_id:
          type: string
          description: >
            Straumur-issued ECOM account identifier (Straumur's API calls this `TerminalIdentifier`).
            This is not a physical POS terminal ID.

    VerifoneConnection:
      type: object
      readOnly: true
      properties:
        connected:
          type: boolean
          example: true
          description: True if the user has Verifone terminal credentials saved
        has_ecom:
          type: boolean
          example: true
          description: |
            True if the entity has a working Verifone ecom gateway attached.
            On a company response this reflects the company-level credentials;
            on a user/employee response this reflects the user's own-settlement
            ecom credentials.

    VerifoneEcomCredentials:
      type: object
      description: >
        Verifone e-comm onboarding credentials used for online payment processing through the
        Verifone payment gateway. This block contains secret material — only admin endpoints
        return it. Public company/user responses must never include these fields.
      properties:
        user_id:
          type: string
          description: Verifone e-comm user ID
        api_key:
          type: string
          description: Verifone e-comm API key
        payment_provider_contract:
          type: string
          description: Verifone payment provider contract identifier
        three_ds_contract_id:
          type: string
          description: Verifone 3-D Secure contract ID
        public_key_alias:
          type: string
          description: Alias of the Verifone-managed public key used for card encryption
        entity_id:
          type: string
          description: Verifone entity (merchant) ID
        pgp_public_key:
          type: string
          description: PGP public key Verifone uses to encrypt payloads sent to this merchant
        token_scope:
          type: string
          description: OAuth token scope assigned to this merchant for the e-comm gateway

    VerifoneConnectRequest:
      type: object
      required:
        - user_id
        - api_key
      properties:
        user_id:
          type: string
          description: Verifone user ID
        api_key:
          type: string
          description: Verifone API key
        merchant_id:
          type: string
          description: Optional Verifone merchant ID for credential validation

    VerifoneTerminalUpdate:
      type: object
      required:
        - terminal_id
        - issuer
      properties:
        terminal_id:
          type: string
          description: Verifone terminal ID (serial number)
        issuer:
          type: string
          description: User ID or Company ID to attach the terminal to. Set to empty string to disconnect.
        description:
          type: string
          description: Optional description for the terminal

    VerifoneTerminals:
      type: array
      items:
        $ref: "#/components/schemas/VerifoneTerminalOption"

    VerifoneTerminalOption:
      type: object
      properties:
        terminalId:
          type: string
          description: Terminal serial number (used as terminal ID)
        name:
          type: string
          description: Display name for the terminal
        merchantId:
          type: string
          description: Merchant ID (entityUID) for this terminal
        deviceModel:
          type: string
          description: Terminal hardware model (e.g. V400m, P400)
        deviceSoftwareVersion:
          type: string
          description: Terminal payment application software version
        poiId:
          type: string
          description: Verifone Point of Interaction ID (used for addressing the terminal in transactions)
        posCloudVersion:
          type: string
          description: Verifone POSCloud API version
        poiState:
          type: string
          description: Terminal connection state (e.g. "Online", "Offline")
        issuer:
          $ref: "#/components/schemas/ExpandableIssuer"

    StraumurConnection:
      type: object
      readOnly: true
      properties:
        connected:
          type: boolean
          example: true
          description: True if the user has Straumur credentials saved
        has_ecom:
          type: boolean
          example: true
          description: |
            True if the entity has a working Straumur ecom gateway attached.
            On a company response this reflects the company-level credentials;
            on a user/employee response this reflects the user's own-settlement
            ecom credentials.

    StraumurConnectRequest:
      type: object
      required:
        - api_key
        - merchant_id
      properties:
        api_key:
          type: string
          description: Straumur API key
        merchant_id:
          type: string
          description: Straumur merchant ID

    StraumurTerminalUpdate:
      type: object
      required:
        - terminal_id
        - issuer
      properties:
        terminal_id:
          type: string
          description: Straumur terminal device ID
        issuer:
          type: string
          description: User ID or Company ID to attach the terminal to. Set to empty string to disconnect.
        description:
          type: string
          description: Optional description for the terminal

    StraumurTerminals:
      type: array
      items:
        $ref: "#/components/schemas/StraumurTerminalOption"

    StraumurTerminalOption:
      type: object
      properties:
        terminal_id:
          type: string
          description: Adyen unique device ID
        issuer:
          $ref: "#/components/schemas/ExpandableIssuer"

    ClaimsConnection:
      type: object
      properties:
        claimant_id:
          type: string
          description: The ID of the claimant for the company.

    GoogleAnalyticsConnection:
      type: object
      properties:
        measurement_id:
          type: string
          description: The Google Analytics Measurement ID for the company.
        api_secret:
          type: string
          description: The Google Analytics API secret for the company.

    CompanyCheckin:
      type: object
      readOnly: true
      properties:
        success_message:
          type: string
          example: "Thank you for visiting us!"

    CompanyMarketplace:
      type: object
      properties:
        onboarded_at:
          type: string
          format: date-time
          description: |
            The date and time when the company was onboarded to online bookings.
            This is used to determine if the company has been onboarded online bookings or not, regardless of the value of `enabled` and `visible`.
        enabled:
          type: boolean
          example: true
          description: Whether the company is enabled on the marketplace. If true, the company will appear in search results, category listings etc. `visible` must be true for this to have any effect.
        visible:
          type: boolean
          example: true
          description: |
            Whether the company is visible through the marketplace API.

            `visible: true - enabled: true` means that the company is visible and enabled on the marketplace. Appears in search results etc.

            `visible: true - enabled: false` means that the company is visible but not enabled on the marketplace. The company does not appear in search results
            and category listings but their booking page is accessbile. This supports the case where companies only want to receive bookings through their own website
            or directly through their noona booking page. (https://noona.app/thebookingpage)

            `visible: false - enabled: true/false` means that the company is not visible at all. The *enabled* flag is ignored in this case.
        url_name:
          description: |
            Used when constructing the marketplace url for the company.

            Can include lowercase letters, numbers and dashes.
          type: string
          example: noonacuts
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9-_]+$"
        email_notification:
          type: boolean
          example: true
          description: |
            Indicates if the company should receive email notifications upon booking confirmation. Notifications are sent to the company's primary email address.

            This feature is especially beneficial for businesses without dedicated employees, relying solely on resources.
        allow_booking_without_confirmation:
          type: boolean
        screening_capacity:
          type: integer
          format: int32
          minimum: 0
          description: |
            Maximum number of guests that can be auto-confirmed when booking screening is enabled.
            A value of 0 or a missing value means all bookings require confirmation.
        allow_booking_over_cancelled_events:
          type: boolean
        allow_booking_multiple_services:
          type: boolean
        waitlist_enabled:
          type: boolean
          example: true
          description: |
            Indicates if the company should be able to receive waitlist entries from the marketplace.

            This allows customers to add themselves to the waitlist at company.
        booking_offer_expiry_minutes:
          type: integer
          format: int32
          description: The number of minutes before a booking offer expires
          example: 1440
        booking_offer_message:
          type: string
          description: The custom message to be sent with booking offers
          example: "Your spot is available! Please book within the next 24 hours."
        booking_offer_message_translations:
          $ref: "#/components/schemas/TranslationMap"

