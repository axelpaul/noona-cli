        - type: object
          required:
            - type
            - duration_overrides
          properties:
            type:
              type: string
              enum: [event_type_duration]
            duration_overrides:
              $ref: "#/components/schemas/EventTypeDurationOverrides"

    PrePaymentRule:
      allOf:
        - $ref: "#/components/schemas/RuleInterval"
        - $ref: "#/components/schemas/RuleEntitiesEventTypes"
        - type: object
          required:
            - type
            - pre_payment_required
            - pre_payment_type
            - pre_payment_min_pax
            - flat_fee
            - pre_payment_ratio
          properties:
            type:
              type: string
              enum: [pre_payment]
            pre_payment_type:
              type: string
              format: enum
              enum: [payment, saved_card]
              default: payment
              example: payment
              description: |
                The type of pre-payment.

                - `payment` - The customer pays the pre-payment amount.
                - `saved_card` - The customer's card details are stored and the pre-payment amount is charged in case of a no-show.
            pre_payment_required:
              type: boolean
              example: true
              description: |
                Is any upfront payment required?

                `true` - pre_payment_ratio is used to indicate how much.

                `false` - pre_payment_ratio is ignored.
            pre_payment_min_pax:
              type: integer
              format: int32
              example: 1
              description: |
                The minimum number of people that must be associated with reservation so that pre-payment is required.
            flat_fee:
              type: integer
              format: int32
              example: 100000
              description: |
                The amount that must be paid in advance.

                If flat_fee is greater than 0 and pre_payment_ratio is set, flat_fee takes precedence.

                In the x100 format.
            pre_payment_ratio:
              type: integer
              format: int32
              example: 20
              minimum: 0
              maximum: 100
              description: |
                How much of the total price must be paid in advance in %.

                If flat_fee is greater than 0 and pre_payment_ratio is set, flat_fee takes precedence.

