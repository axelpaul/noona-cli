  /v1/hq/companies/{company_id}/subscriptions/payment_intent:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    post:
      security:
        - BearerTokenAuth: []
      summary: Create a payment intent
      description: |
        Create a payment intent to be used for the 3DSecure payment flow.
        When amount and currency are omitted, a small validation charge is used (for card-on-file validation during initial powerup signup).
        When provided, the intent is created for the requested amount, used to authorize purchases (e.g. credit packs, marketing campaigns).
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
            example: "dwawd8awudawd"
            description: Company ID
        - name: amount
          in: query
          required: false
          schema:
            type: integer
            format: int64
            description: |
              Amount in the smallest currency unit (e.g. cents).
              Without item_price_id: the exact intent amount. When omitted, falls back to a card-validation amount.
              With item_price_id: a unit price override applied to the item (used for custom-amount charges like marketing campaigns).
        - name: currency
          in: query
          required: false
          schema:
            type: string
            description: ISO 4217 currency code. When omitted, the company's preferred currency is used.
        - name: item_price_id
          in: query
          required: false
          schema:
            type: string
            description: When provided, the intent amount is set to the gross total (incl. tax) Chargebee will charge for this item price, computed via an invoice estimate.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntent"
          description: Created payment intent
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      operationId: CreatePaymentIntent
      tags:
        - Subscriptions

