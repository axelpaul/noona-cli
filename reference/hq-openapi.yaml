          description: |
            The marketplace user that this customer record represents.
            When set, this customer was created through the Noona Marketplace app by the user themselves.
            This establishes a 1:1 relationship between the customer and the marketplace user.
          readOnly: true
          $ref: "#/components/schemas/ExpandableMarketplaceUser"
        parent_marketplace_user:
          description: |
            The marketplace user that created this customer using the "book for other" functionality.
            When set, this customer was booked on behalf of someone else (e.g., a family member).
            Multiple customers can share the same parent marketplace user, allowing one user to manage bookings for their family.
