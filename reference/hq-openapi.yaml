  /v1/hq/companies/{company_id}/time_slots:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - time_slots:read
      summary: List time slots
      description: |
        Gets all available tima slots for company based on filter.

        Either **event_type_ids** or **event_id** must be provided.

        Capacity is the number of customers in booking.
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
            example: "aw7da9wd8ua28a821"
            description: "Company ID"
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            example: "8a1da9wd8ua28aa9d"
        - name: resource_id
          in: query
          required: false
          schema:
            type: string
            example: "ea7da9wd8ua28a134"
        - name: event_type_ids
          in: query
          required: false
          schema:
            type: array
            example: ["te7da9wd8ua28a1ab", "xa7da9wd8ua01a134"]
            items:
              type: string
        - name: event_id
          in: query
          required: false
          schema:
            type: string
            example: "xa7da9wd8ua01a134"
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            example: "2021-01-31"
        - name: capacity
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 5
            default: 1
        - name: duration
          in: query
          required: false
          description: Duration is by default inferred from event type(s) but can be overwritten with this parameter.
          schema:
            type: integer
            format: int32
            example: 30
        - name: skip_can_perform
          in: query
          required: false
          description: If true, skips checking if employees and resources can perform the event types and returns all available timeslots
          schema:
            type: boolean
            example: false
        - name: override_booking_interval
          in: query
          required: false
          description: Override the booking interval used for generating timeslots. This overrides the intervals set on the company, employees, and resources.
          schema:
            $ref: "#/components/schemas/BookingInterval"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSlots"
          description: Time slots
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFoundError"
      operationId: ListTimeSlots
      tags:
        - Time Slots

