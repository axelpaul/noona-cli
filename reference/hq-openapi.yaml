        - type: object
          properties:
            from:
              type: string
              format: date-time
              description: Only return blocked times where starts_at is after this timestamp.
            to:
              type: string
              format: date-time
              description: Only return blocked times where starts_at is before this timestamp.

    GenericStreamFilter:
      description: |
        Filter for the generic entity stream endpoint.

        Specifies which types of entities to subscribe to for real-time updates.
        Multiple entity types can be specified to receive updates for all of them.
      type: object
      required:
        - entity_types
      properties:
        entity_types:
          type: array
          items:
            $ref: "#/components/schemas/StreamableEntityType"
          description: |
            The types of entities to stream updates for.

            Clients will receive notifications when any of the specified entity types
            are created, updated, or deleted within the company.
          example: ["events", "notifications", "products"]

    StreamableEntityType:
      type: string
      enum:
        - notifications
        - products
        - product_groups
        - event_types
        - event_type_groups
        - events
        - blocked_times
        - time_slot_reservations
        - resources
        - employees
        - transactions
        - payments
        - task_instances
        - company_subscription
        - credit_wallets
      description: |
        The types of entities that can be streamed for real-time updates.
      example: "events"

    StreamEventName:
      type: string
      enum:
        - onNotificationUpdated
        - onProductUpdated
        - onProductGroupUpdated
        - onEventTypeUpdated
        - onEventTypeGroupUpdated
        - onEventUpdated
        - onBlockedTimeUpdated
        - onTimeSlotReservationUpdated
        - onResourceUpdated
        - onEmployeeUpdated
        - onTransactionCompleted
        - onPaymentUpdated
        - onTaskInstanceUpdated
        - onCompanySubscriptionUpdated
        - onCreditWalletUpdated
      description: |
        The Server-Sent Event names that will be emitted by the generic stream endpoint.

        **Usage with JavaScript EventSource:**
        ```javascript
        const eventSource = new EventSource('/v1/hq/stream/companies/123?filter={"entity_types":["events","products"]}');

        eventSource.addEventListener('onEventUpdated', (event) => {
          console.log('Event updated:', event.data); // "{}"
        });

        eventSource.addEventListener('onProductUpdated', (event) => {
          console.log('Product updated:', event.data); // "{}"
        });
        ```

        **SSE Format:**
        ```
        event: onEventUpdated
        data: {}

        event: onProductUpdated
        data: {}
        ```
      example: "onEventUpdated"

