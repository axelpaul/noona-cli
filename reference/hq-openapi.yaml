      properties:
        type:
          type: string
          format: enum
          enum: [rates]
        default_rate:
          description: Default commission rate
          format: double
          type: number
          example: 10
          maximum: 100
          minimum: 0

    EmployeeMarketplaceSettings:
      type: object
      properties:
