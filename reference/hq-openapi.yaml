          description: "Filter by event IDs"
          type: array
          items:
            type: string

    CreateSMSError:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          enum: [validation, quota_exceeded, non_whitelisted_urls, insufficient_credits]
        message:
          type: string

    Reminders:
      type: array
      items:
        $ref: "#/components/schemas/Reminder"

    Reminder:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: "8wa9uiah28dawd123"
        title:
          type: string
          example: "Lunch reminder"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        employees:
          type: array
          items:
            type: string
          description: Employee IDs for employee-specific reminders. If empty or null, reminder applies to all employees.
          example: ["emp123", "emp456"]
        event_types:
          type: array
          items:
            type: string
          description: Event type IDs for event-specific reminders. If empty or null, reminder applies to all event types.
          example: ["svc123", "svc456"]
        minutes_before:
          type: integer
          format: int32
          example: 1440
          description: How many minutes before the event to send the reminder (e.g., 1440 = 24 hours)
        notification_channels:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
          description: Channels through which the reminder should be sent
          example: ["sms"]
        sms_content:
          type: string
          readOnly: true
          description: Inline SMS content with {{variable}} placeholders
          example: "Hi {{customer_name}}, this is a reminder that {{employee_name}} will see you at {{event_time}} at {{company_name}}"
        sms_content_translations:
          $ref: "#/components/schemas/TranslationMap"
        default:
          type: boolean
          description: Whether or not this is a default reminder
        active:
          type: boolean
          description: Whether the reminder is active or inactive
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    ReminderCreate:
      type: object
      required:
        - company_id
        - minutes_before
        - notification_channels
      properties:
        title:
          type: string
          example: "Lunch reminder"
        company_id:
          type: string
          description: Company ID
          example: "cmp123"
        employees:
          type: array
          items:
            type: string
          description: Employee IDs for employee-specific reminders
        event_types:
          type: array
          items:
            type: string
          description: Event type IDs for event-specific reminders
        minutes_before:
          type: integer
          format: int32
          example: 1440
          description: How many minutes before the event to send the reminder
        notification_channels:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
          description: Channels through which the reminder should be sent
        sms_content_translations:
          $ref: "#/components/schemas/TranslationMap"
        default:
          type: boolean
          description: |
            Marks the reminder as the company's default. Requires a global
            reminder with translations matching the base template; failed
            constraints fall back to non-default. Limited to one per company.
        active:
          type: boolean
          description: Whether the reminder is active or inactive. Defaults to true if not provided.
          default: true

    ReminderUpdate:
      type: object
      properties:
        title:
          type: string
          example: "Lunch reminder"
        employees:
          type: array
          items:
            type: string
          description: Employee IDs for employee-specific reminders
        event_types:
          type: array
          items:
            type: string
          description: Event type IDs for event-specific reminders
        minutes_before:
          type: integer
          format: int32
          example: 1440
          description: How many minutes before the event to send the reminder
        notification_channels:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
          description: Channels through which the reminder should be sent
        sms_content_translations:
          $ref: "#/components/schemas/TranslationMap"
        default:
          type: boolean
          description: |
            Marks the reminder as the company's default. Setting true
            replaces sms_content_translations with the base template and
            requires a global reminder. Omit to re-evaluate: timing or
            active changes retain default, translation or scoping changes
            revert to custom.
        active:
          type: boolean
          description: Whether the reminder is active or inactive

    ReminderError:
      type: object
      required:
        - type
        - message
      properties:
        type:
          $ref: "#/components/schemas/ReminderErrorType"
        message:
          type: string
          description: English error message for logging/debugging
        user_message:
          type: string
          example: "A global reminder with this time period already exists"
          description: A human readable error message that is translated according to the user's locale

    ReminderErrorType:
      type: string
      enum:
        [
          validation,
          duplicate_global_reminder,
          duplicate_default_reminder,
          default_reminder_not_global,
          non_whitelisted_urls,
          all_employees_selected,
          all_event_types_selected,
          sms_content_locked_during_trial,
          reminders_locked_during_trial,
        ]
      description: The specific error code for the reminder validation error

    ReminderFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        minutes_before:
          type: integer
          format: int32
          description: Filter by minutes before the event
        notification_channels:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
          description: Filter by notification channels

