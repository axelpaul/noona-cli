            - massage_therapy
            - therapeutic_massage_therapy
            - podiatry
            - chiropractic
          description: The type of certification
        certification_level:
          type: string
          enum:
            - apprentice
            - journeyman
            - master
          description: "The certification level (if applicable)"
        submitted_at:
          type: string
          format: date-time
          description: When the verification was submitted
        approved_at:
          type: string
          format: date-time
          description: When the verification was approved
        rejected_at:
          type: string
          format: date-time
          description: When the verification was rejected
        rejected_reason:
          type: string
          description: Reason for rejection

    VerificationRequest:
      type: object
