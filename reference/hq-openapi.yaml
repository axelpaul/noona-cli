    parameters:
      - in: path
        name: client_id
        required: true
        schema:
          type: string
    post:
      security:
        - BearerTokenAuth: []
      summary: Admin - Rotate agent client secret
      description: |
        Generates a new client_secret for the agent client and invalidates the previous one.
        Existing access tokens minted from the previous secret remain valid until their natural expiry,
        allowing consumers time to cut over. The plaintext secret is returned only in this response
        and cannot be retrieved again.
