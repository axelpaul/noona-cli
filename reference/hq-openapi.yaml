tags:
  - name: Hidden
    description: Hidden endpoints. Still invokable, but not documented. Very useful for backwards compatibility but keeping our docs clean.
  - name: User
    description: User management.
  - name: Tokens
    description: API Tokens can be used to authenticate requests to the API.
  - name: Products
    description: Products describe goods you offer to your customers.
  - name: Product Groups
    description: |
      Product Groups are used to group products into categories. A shampoo might, for example, belong to a product group titled "Hair Products".

      Products can reside in multiple product groups simultaneously.
  - name: Marketplace Companies
    x-displayName: Companies
    description: |
      Companies are individual service providers such as **Hair salons**, **Chiropractors** and **Veterinarians**.
  - name: Event Types
    description: |
      Event Types describe the different services a company offers.
  - name: Event Type Groups
    description: |
      Event Type Groups are used to group event types into categories. A haircut might, for example, belong to an event type group titled "Haircuts".

      Event types can reside in multiple event type groups simultaneously.
  - name: Events
    description: |
      Events are the center point of our whole system.

      A haircut that an HQ user performs on some marketplace user at a specified time is an event.
  - name: Blocked times
    description: Blocked times are a multi-purpose feature to block certain times from being bookable in the calendar.
  - name: Enterprises
    description: An enterprise is an umbrella entity which purpose is maintaining a relation between multiple companies.
  - name: Sales
    description: |
      Sales are used to group related transactions, for example product and service sales with different invoice issuers for the same customer or original invoice and a refund.

      Customer info for transactions is stored on the sale as well as reference to events that were paid in this sale.
  - name: Transactions
    description: Transactions are made up of service and products that can be paid in subtransactions
  - name: Subtransactions
    description: |
      Subtransactions make up the individual payment methods used in a single transaction.

      A transaction of $20 might be split into subtransactions of $5 in cash and $15 by card.
  - name: Payment Methods
    description: |
      The various payment methods available in the Noona ecosystem.
  - name: Terminals
    description: |
      Terminals are used to charge credit cards for services.
  - name: User Terminals
    x-displayName: Terminals
    description: |
      Terminals are used to charge credit cards for services.
  - name: Customers
    description: |
      Customers are individuals that have booked an event with a company.
  - name: Customer Groups
    description: |
      Customer Groups are used to group customers into categories. A customer might, for example, belong to a customer group titled "Regulars".
  - name: Voucher Templates
    description: |
      Voucher templates are predefined templates that enable a fast creation of vouchers.
  - name: Vouchers
    x-displayName: Vouchers
    description: |
      Vouchers are purchased through the marketplace and can be used to pay for a service at an enterprise.
  - name: Settlement Accounts
    description: |
      Settlement accounts are used by an enterprise to take payments.
  - name: Payments
    description: |
      Payments are created by the marketplace when a customer pays for an event, voucher or product.

      Payments are bulked and sent to an enterprise as a settlement.
  - name: Settlements
    description: |
      Settlements are the sum of multiple payments that the company has received via different sales channels.

      Settlements are transferred to the enterprise's settlement account on a weekly basis.
  - name: Custom Properties
    description: Custom properties enable the possibility of extending resources with custom data.
  - name: Webhooks
    description: |
      Webhooks are used to receive notifications about events that occur in the Noona ecosystem.

      Multiple events can be tied to a single callback URL.

      A callback payload for **creation** and **update** reflects the current state of the resource.

      A callback payload for **deletion** reflects the state of the resource before deletion.
  - name: Subscriptions
    description: Subscriptions are the container for plans which can include several powerups. They are used to charge and manage the features used by companies.
  - name: Webhook Invocations
    description: |
      Webhook Invocations are the actual HTTP requests that are sent to a webhook's callback URL.

      Webhook invocations are logged and can be inspected via the API.
  - name: Push Notifications
    description: |
      Push Notifications are used to send notifications to the Noona mobile app, such as new events, cancelled events and more..
  - name: Notifications
    description: |
      Notifications inform users about various things such as new events, cancelled events and more.
  - name: Saltpay
    description: |
      The Saltpay integration enables connecting and sending payments to a Saltpay terminal.
  - name: Verifone
    description: |
      The Verifone integration enables connecting and sending payments to a Verifone terminal.
  - name: Straumur
    description: |
      The Straumur integration enables connecting and sending payments to a Straumur terminal.
  - name: Adyen
    description: |
      The Adyen integration enables activating various payment services.
  - name: Fiscalization
    description: |
      Fiscalization is the process of sending data to an external system for the purpose of tax reporting.
  - name: Goals
    description: |
      Goals are structured objectives that help companies complete important setup and operational tasks.

      Each goal consists of multiple tasks that can be completed in sequence or independently based on prerequisites.
  - name: Reminders
    description: |
      Reminders are configured for automated reminders to be sent to customers before events (appointments).

      Reminders can be configured to send via SMS, with customizable timing (e.g., 24 hours before the event) and content.

      Reminders can be scoped to specific employees or event types, or applied company-wide. SMS content can be translated into multiple languages.
  - name: Time Slots
    description: |
      Time Slots are points in time when a company can provide a specified service.
  - name: Activities
    description: |
      Activities are used to track changes to resources in the Noona ecosystem.
  - name: Resources
    description: |
      Resources that might be required for a service. For example, a massage parlor might have a resource called "Massage Room 1".

      An Event Type might then require a resource and an employee to be available in order to be bookable at a certain time.
  - name: Resource Groups
    description: |
      Resource Groups are used to group resources together.
  - name: Scheduled Events
    description: |
      Scheduled Events represent explicit, time-bound occurrences such as concerts, classes, workshops, group fitness sessions, or any event that happens at a specific time with limited capacity.

      Unlike regular Event Types which define bookable services with flexible scheduling, Scheduled Events have:
      - **Fixed start and end times** - The event occurs at a specific date and time
      - **Capacity limits** - A maximum number of attendees across all tiers
      - **Multiple pricing tiers** - Different ticket types (e.g., "Floor" vs "Balcony", "Adult" vs "Child")

      Each tier in a Scheduled Event automatically creates managed Event Type and Resource entities behind the scenes. These managed entities:
      - Are hidden from regular Event Type and Resource listings
      - Have their lifecycle controlled by the parent Scheduled Event
      - Are automatically deleted when the Scheduled Event is deleted

      **Common use cases:**
      - Concert or show ticketing with different seating sections
      - Group fitness classes with limited spots
      - Workshops or seminars with tiered pricing
      - Tours or experiences with capacity constraints
  - name: Employees
    description: |
      Employees are the individuals that work at a company and provide services to customers.

      An employee is a HQ user in the context of a company. A HQ user can be an employee at multiple companies.

      The employee resource describes that company specific data for the HQ user.
  - name: OAuth
    description: |
      OAuth is used to authenticate users and applications to the Noona API.
  - name: Applications
    description: |
      Applications are created by third party developers to gain scoped access to the Noona API on behalf of users.
  - name: Apps
    description: |
      Apps are 3rd party applications that can be installed by companies to extend the functionality of Noona.
  - name: Event Statuses
    description: |
      Event statuses are used to describe the current state of an event.

      Noona has a set of default statuses:
      - **showedUp**
      - **cancelled**
      - **noshow**
      - **checkedOut**
      - and the implicit *empty* status.

      Custom statuses can be created to extend the default set.
  - name: Event Type Category Groups
    description: |
      Event Type Category Groups are top level grouping of event type categoires. An example of event type category group is *Barbering* and event type categories in that group could be *Men's haircut* and *Beard Trimming*.
  - name: Event Type Categories
    description: |
      Event Type Categories are used to group event types into categories. An example of an event type category is *Men's haircut* which is in the event type category group *Barbering*.
  - name: Work Hours
    description: |
      Work Hours define per-entity (employee or resource) availability schedules.
      Each entry is a rule set with explicit entity ownership fields.
  - name: Rule Sets
    description: |
      Rule sets are used to define the behavior of the system. Multiple rules of the same type can be active at the same time within a single rule set, but but can not overlap.

      Multiple rule sets can be active at the same time, in that case the rules take priority according to the overlapping rules chapter below.

      **List of rules**

      - `availability`

        Specifies when company is open or closed for business. By default a business is closed. Can be tied to specific employees and resources.

      - `online_bookings`

        Specifies when company accepts online bookings. Can be tied to specific entities.

      - `max_total_pax`

        Specifies the maximum number of people that can be booked at the same time.


      **Overlapping rules**

      If 2 or more rule sets are active during the same period, the comparison is done in the following order:

      1. The rule set with fewer instances (according to the RRule, or the lack of one) takes priority.
      2. If the rule sets have the same number of instances, the rule set with the shorter time period takes priority. (The time period is defined by the starts_at and ends_at of the rule set.)
      3. If the rule sets have the same number of instances and the same time period, the rule set that was most recently updated takes priority.

      The `priority` attribute can be used to override the default priority.

      Rules with a priority set will always take precedence over rules without a priority set.

      Lower priority values take precedence over higher priority values.

      **Associated Entities**

      Rules can be divided into two categories:

      1. General rules
      2. Rules tied to certain entities

      Entities:

      - Event Types
      - Resources
      - Employees

      When a rule is tied to entities, it will only affect the entities it is tied to.
      This is achieved through the following attributes, using resources as an example:

      - `resources` - A list of resource IDs.
      - `association` - The association type. Can be either `include` or `exclude`.

      **Examples**

      ---
      ```json
      {
        resources: ["id-1", "id-2"],
        association: "includes",
      }
      ```
      This rule is only applicable to resources with the IDs `id-1` and `id-2`.

      ---

      ```json
      {
        resources: ["id-1", "id-2"],
        association: "excludes",
      }
      ```

      This rule is applicable to all resources except those with the IDs `id-1` and `id-2`.

      ---

      ```json
      {
        resources: [],
        association: "excludes",
      }
      ```

      This rule is applicable to all resources.

      ---

      **Interval**

      The interval of a rule set is defined by the `starts_at` and `ends_at` attributes.

      By default, rules in a set are active in that interval but each rule can overwrite the starts_at and ends_at attributes to define a custom interval.

      A rule can however not extend beyond the interval of the rule set.
  - name: Rule Set Templates
    description: |
      Rule Set Templates offer a quick way to create rule sets with predefined rules.
  - name: Mozrest
    description: |
      The Mozrest integration allows companies to appear on various external booking platforms.
  - name: Categories
    description: |
      Categories are used to group and categorize companies.
  - name: Agent
    description: |
      Endpoints designed specifically for AI agents authenticated via agent tokens.

      These endpoints are never reachable by OAuth applications. They expose
      slim, agent-friendly views over Noona resources (e.g. searchable company
      lists) intended for programmatic use by agent runtimes.

paths:
  /v1/hq/enterprises:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
      summary: List enterprises
      description: Lists all enterprises the user has access to.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprises"
          description: Enterprises
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      operationId: ListEnterprises
      tags:
        - Enterprise

  /v1/hq/enterprise/{enterprise_id}:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerTokenAuth: []
      summary: Retrieve enterprise
      description: Retrieve enterprise by ID.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
          description: Enterprise
        "404":
          $ref: "#/components/responses/NotFoundError"
      operationId: GetEnterprise
      tags:
        - Enterprise
    post:
      security:
        - BearerTokenAuth: []
      summary: Update enterprise
      description: Updates enterprise by ID.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
        - in: query
          name: unset
          schema:
            $ref: "#/components/schemas/EnterpriseFields"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Enterprise"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
          description: Updated enterprise
        "404":
          $ref: "#/components/responses/NotFoundError"
      operationId: UpdateEnterprise
      tags:
        - Enterprise

  /v1/hq/enterprise/{enterprise_id}/companies:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
      summary: List enterprise companies
      description: Lists all companies for an enterprise
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
        - in: query
          name: sort
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompaniesResponse"
          description: Enterprise companies
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
      operationId: ListEnterpriseCompanies
      tags:
        - Enterprise

  /v1/hq/enterprise/{enterprise_id}/settlement_accounts:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
      summary: List settlement accounts
      description: Lists the settlement accounts of an enterprise.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementAccounts"
          description: Settlement accounts
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: ListEnterpriseSettlementAccounts
      tags:
        - Settlement Accounts

  /v1/hq/enterprise/{enterprise_id}/settlement_accounts/{settlement_account_id}:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
      summary: Get settlement account
      description: Retrieves settlement account of an enterprise with ID.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
        - name: settlement_account_id
          description: Settlement Account ID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementAccount"
          description: Settlement account
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: GetEnterpriseSettlementAccount
      tags:
        - Settlement Accounts
    delete:
      security:
        - BearerTokenAuth: []
      summary: Delete settlement account
      description: Deletes a settlement account for an enterprise.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
        - name: settlement_account_id
          description: Settlement Account ID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement account deleted
      operationId: DeleteEnterpriseSettlementAccount
      tags:
        - Settlement Accounts

  /v1/hq/enterprise/{enterprise_id}/voucher_templates:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:read
      summary: List voucher templates
      description: Lists the voucher templates of an enterprise.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
        - in: query
          name: filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplateFilter"
        - in: query
          name: sort
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplatesResponse"
          description: VoucherTemplates
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: ListVoucherTemplatesLegacy
      tags:
        - Hidden
    post:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:write
      summary: Create voucher template
      description: Creates a voucher template at enterprise tied to company.
      parameters:
        - name: enterprise_id
          description: Enterprise ID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherTemplateCreate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplateResponse"
          description: Created Voucher
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: CreateVoucherTemplateLegacy
      tags:
        - Hidden

  /v1/hq/companies/{company_id}/voucher_templates:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:read
      summary: List voucher templates
      description: Lists the voucher templates for a company.
      parameters:
        - name: company_id
          description: Company ID
          in: path
          required: true
          schema:
            type: string
        - in: query
          name: filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplateFilter"
        - in: query
          name: sort
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplatesResponse"
          description: VoucherTemplates
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: ListVoucherTemplates
      tags:
        - Voucher Templates

  /v1/hq/legacy_reports:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    post:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - reports:write
      tags:
        - Reports
      summary: Create a new report
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyReport"
      responses:
        "200":
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyReportResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"

  /v1/hq/voucher_templates:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    post:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:write
      summary: Create voucher template
      description: Creates a voucher template for company.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherTemplateCreate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplateResponse"
          description: Created Voucher
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: CreateVoucherTemplate
      tags:
        - Voucher Templates

  /v1/hq/voucher_templates/{voucher_template_id}:
    parameters:
      - $ref: "#/components/parameters/select"
    get:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:read
      summary: Get voucher template
      description: Gets a single voucher template.
      parameters:
        - name: voucher_template_id
          description: Voucher Template ID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherTemplateResponse"
          description: Voucher Template
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      operationId: GetVoucherTemplate
      tags:
        - Voucher Templates
    post:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - voucher_templates:write
      summary: Update voucher template
      description: Updates a voucher template at enterprise.
      parameters:
        - name: voucher_template_id
          description: Voucher Template ID
          in: path
          required: true
          schema:
            type: string
        - in: query
          name: unset
          schema:
            $ref: "#/components/schemas/VoucherTemplateFields"
      requestBody:
