    NotificationEvent:
      allOf:
        - $ref: "#/components/schemas/NotificationMetadata"
        - type: object
          required:
            - type
            - status
          properties:
            type:
              type: string
              format: enum
              enum: [event]
            status:
              type: string
              format: enum
              enum: [confirmed, rescheduled, cancelled, request]
            company:
              type: string
              example: "daw89dw9a7wd9a8w7d"
            customer:
              type: string
              example: "daw89dw9a7wd9a8w7d"
            customer_name:
              type: string
              example: "John Doe"
            employee:
              type: string
              example: "daw89dw9a7wd9a8w7d"
            employee_name:
              type: string
              example: "John Doe"
            space:
              type: string
              example: "daw89dw9a7wd9a8w7d"
            space_name:
              type: string
              example: "Room 1"
            resources:
              type: array
              items:
                type: string
                example: "daw89dw9a7wd9a8w7d"
              description: The resources that are booked for the event
            resource_names:
              type: array
              items:
                type: string
                example: "Room 1"
              description: The names of the resources that are booked for the event
            event:
              type: string
              description: The event which the notification is for.
              example: "dw89aw8da8wd"
            event_type_names:
              type: array
              items:
                type: string
                example: "Haircut"
              description: The names of the event types
            starts_at:
              type: string
              format: date-time
              example: "2022-09-12T12:00:00Z"
              description: Start time of event
            duration:
              type: integer
              format: int32
              example: 60
              description: Duration of event in minutes
            rescheduled_from:
              type: string
              format: date-time
              example: "2022-01-01T12:00:00Z"
              description: The original date and time of the event
            new_customer:
              type: boolean
              example: true
              description: True if the customer is new
            customer_comment:
              type: string
              description: A comment that the customer included during a marketplace booking.
            cancel_reason:
              type: string
              example: "I'm sick and can't make it"
              description: Provided by customers when they decline through the marketplace.
            payment_amount:
              type: number
              format: double
              example: 10000
              readOnly: true
              description: The amount of the payment if the event has a payment associated with it.
            payment_currency:
              type: string
              example: "ISK"
              readOnly: true
              description: The currency of the payment if the event has a payment associated with it.
            payment_status:
              $ref: "#/components/schemas/PaymentStatus"
            number_of_guests:
              type: integer
              format: int32
              example: 1
              description: Number of guests for the event.
            scheduled_event_id:
              type: string
              example: "daw89dw9a7wd9a8w7d"
              description: The ID of the scheduled event that the booking belongs to. Used by the frontend to determine routing (scheduled events calendar vs regular calendar).
            scheduled_event_name:
              type: string
              example: "Summer Concert"
              description: The name of the scheduled event that the booking belongs to.

