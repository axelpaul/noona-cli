      properties:
        active:
          type: boolean
          example: true
          description: Filter by active status
        goal_template_ids:
          type: array
          items:
            $ref: "#/components/schemas/GoalTemplate"

    Tasks:
      type: array
      items:
        $ref: "#/components/schemas/Task"

    Task:
      type: object
      required:
        - id
        - company_id
        - goal_instance
        - task_template
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: 7awdXwZoedakjad37a
          readOnly: true
        company_id:
          type: string
          example: 7awdXwZoedakjad37a
          readOnly: true
        goal_instance:
          type: string
          example: 7awdXwZoedakjad37a
          readOnly: true
        task_template:
          type: string
          example: task_create_services
          readOnly: true
        title:
          type: string
          example: "Create your services"
          readOnly: true
          description: Localized title from the task template
        description:
          type: string
          example: "Add at least one service to your catalog"
          readOnly: true
          description: Localized description from the task template
        completion_method:
          $ref: "#/components/schemas/TaskCompletionMethod"
          readOnly: true
        order:
          type: integer
          format: int32
          example: 1
          readOnly: true
          description: Display order within the goal
        prerequisites:
          type: array
          readOnly: true
          description: Task template IDs that must be completed before this task
          items:
            type: string
            example: task_create_services
        icon:
          type: string
          example: "Calendar"
          readOnly: true
        action:
          $ref: "#/components/schemas/TaskAction"
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          description: Set when the task is marked complete (manually or computed)
        blocked:
          type: boolean
          readOnly: true
          description: Whether the task is blocked by incomplete prerequisites

    ActivateGoalRequest:
      type: object
      required:
        - company_id
      properties:
        company_id:
          type: string
          description: The company ID that owns the goal

    UpdateGoalRequest:
      type: object
      properties:
        goal_completion_acknowledged:
          type: boolean
          description: Whether the goal completion has been acknowledged

    UpdateTaskRequest:
      type: object
      required:
        - company_id
      properties:
        company_id:
          type: string
          description: The company ID that owns the task
        completed:
          type: boolean
          description: |
            Set to true to mark the task as complete. For manual tasks only. Computed tasks are automatically evaluated.

    TaskCompletionMethod:
      type: string
      format: enum
      enum: [manual, computed]
      example: manual
      description: |
        How the task is completed:
        - manual: Explicitly marked complete via a request to the API
        - computed: Automatically computed based on company data

    TaskAction:
      type: object
      description: Configuration for the task's call-to-action button
      properties:
        title:
          type: string
          example: "Go to services"
          description: Localized button text
        completed_title:
          type: string
          example: "View"
          description: Localized button text when the task has been completed
        type:
          $ref: "#/components/schemas/TaskActionType"
        navigate_to:
          $ref: "#/components/schemas/TaskNavigateTo"
        content:
          type: string
          example: "Text to copy"
          description: Dynamic content based on action type.

    TaskActionType:
      type: string
      format: enum
      enum: [navigate, copy]
      example: navigate
      description: |
        Type of action:
        - navigate: Navigate to a specific pre-determined location in the app
        - copy: Copy content to clipboard

    TaskNavigateTo:
      type: string
      format: enum
      enum:
        - marketplace_profile_onboarding
        - marketplace_profile
        - event_types
        - employees
        - calendar_settings
        - staff_work_hours
      example: event_types
      description: |
        Pre-determined navigation destination for the task action.
        - marketplace_profile_onboarding: Navigate to marketplace profile onboarding flow
        - marketplace_profile: Navigate to marketplace profile settings
        - event_types: Navigate to event types/services page
        - employees: Navigate to employees/staff page
        - calendar_settings: Navigate to calendar settings page
        - staff_work_hours: Navigate to staff work hours settings page

