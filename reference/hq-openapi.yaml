    # Scheduled Events
    ScheduledEvents:
      type: array
      items:
        $ref: "#/components/schemas/ScheduledEvent"

    ScheduledEvent:
      type: object
      description: A scheduled event with fixed start/end times and capacity limits.
      properties:
        id:
          type: string
          readOnly: true
          example: "se_abc123"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        name:
          type: string
          example: "Imagine Dragons Concert"
        name_translations:
          $ref: "#/components/schemas/TranslationMap"
        description:
          type: string
          example: "Live concert at O2 Arena"
        description_translations:
          $ref: "#/components/schemas/TranslationMap"
        starts_at:
          type: string
          format: date-time
          example: "2024-03-15T20:00:00Z"
        ends_at:
          type: string
          format: date-time
          example: "2024-03-15T23:00:00Z"
        marketplace_visible:
          type: boolean
          example: true
          description: Whether this event is visible on the marketplace.
        allow_cancellation:
          type: boolean
          example: true
          description: Whether customers can cancel their booking.
        min_cancel_notice_minutes:
          type: integer
          format: int32
          example: 1440
          description: Minimum notice required for cancellation in minutes.
        customer_selects_tier:
          type: boolean
          example: true
          description: Whether the customer selects their tier or it is assigned automatically.
        booking_success_message:
          type: string
          example: "Thank you for booking! We look forward to seeing you."
          description: Custom success message displayed after a successful booking.
        booking_success_message_translations:
          $ref: "#/components/schemas/TranslationMap"
        location:
          $ref: "#/components/schemas/Location"
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledEventTierResponse"
        total_capacity:
          type: integer
          format: int32
          readOnly: true
          description: Sum of max_capacity across all tiers.
          example: 500
        remaining_capacity:
          type: integer
          format: int32
          readOnly: true
          description: Total capacity minus booked guests.
          example: 350
        is_full:
          type: boolean
          readOnly: true
          description: Whether all tiers are at capacity.
          example: false
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    ScheduledEventCreate:
      type: object
      description: Request body for creating a scheduled event.
      required:
        - company
        - name_translations
        - starts_at
        - ends_at
        - tiers
      properties:
        company:
          type: string
          description: Company ID
          example: "company_xyz"
        name_translations:
          $ref: "#/components/schemas/TranslationMap"
        description_translations:
          $ref: "#/components/schemas/TranslationMap"
        starts_at:
          type: string
          format: date-time
          example: "2024-03-15T20:00:00Z"
        ends_at:
          type: string
          format: date-time
          example: "2024-03-15T23:00:00Z"
        marketplace_visible:
          type: boolean
          example: true
        allow_cancellation:
          type: boolean
          example: true
        min_cancel_notice_minutes:
          type: integer
          format: int32
          example: 1440
        customer_selects_tier:
          type: boolean
          example: true
        booking_success_message_translations:
          $ref: "#/components/schemas/TranslationMap"
        location:
          $ref: "#/components/schemas/Location"
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        tiers:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ScheduledEventTier"

    ScheduledEventUpdate:
      type: object
      description: Request body for updating a scheduled event.
      properties:
        name_translations:
          $ref: "#/components/schemas/TranslationMap"
        description_translations:
          $ref: "#/components/schemas/TranslationMap"
        starts_at:
          type: string
          format: date-time
