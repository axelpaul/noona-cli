        settlement_account:
          $ref: "#/components/schemas/SettlementAccount"
        payments_from:
          type: string
          format: date-time
          readOnly: true
        payments_to:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SettlementLineItems:
      type: array
      items:
        $ref: "#/components/schemas/SettlementLineItem"

    SettlementLineItem:
      type: object
      properties:
        title:
          type: string
          example: "voucher"
          readOnly: true
        quantity:
          type: integer
          format: int32
          example: 8
        total:
          type: number
          format: double
          example: 40000
        fee:
          type: number
          format: double
          example: 2000
        net_total:
          type: number
          format: double
          example: 38000

    SettlementFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        from:
          type: string
          format: date-time
          example: "2020-08-24T14:15:22Z"
        to:
          type: string
          format: date-time
          example: "2022-08-24T14:15:22Z"

    ExpandablePayment:
      description: "[Expandable](https://api.noona.is/docs/working-with-the-apis/expandable_attributes)"
      oneOf:
        - $ref: "#/components/schemas/ID"
        - $ref: "#/components/schemas/Payment"

    ExpandablePaymentMethod:
      description: "[Expandable](https://api.noona.is/docs/working-with-the-apis/expandable_attributes)"
      oneOf:
        - $ref: "#/components/schemas/ID"
        - $ref: "#/components/schemas/PaymentMethod"

    Payments:
      type: array
      items:
        $ref: "#/components/schemas/Payment"

    Payment:
      type: object
      properties:
        id:
          example: 7awdXwZoedakjad37a
          type: string
          readOnly: true
        reference:
          example: ABCD1234
          description: Reference from payment service provider
          type: string
          readOnly: true
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        marketplace_user:
          $ref: "#/components/schemas/ExpandableMarketplaceUser"
        customer:
          $ref: "#/components/schemas/ExpandableCustomer"
        employee:
          $ref: "#/components/schemas/ExpandableEmployee"
        event:
          $ref: "#/components/schemas/ExpandableEvent"
        status:
          $ref: "#/components/schemas/PaymentStatus"
        refundable:
          type: boolean
          example: true
          readOnly: true
          description: |
            Indicates if the payment is refundable.

            If true, the payment can be refunded. If false, the payment cannot be refunded.
        reason:
          type: string
          format: enum
          enum: [voucher, event, paylink, noshow]
          example: "voucher"
          readOnly: true
        provider:
          type: string
          format: enum
          enum: [teyadirect, adyen, teya]
          example: "teya"
          readOnly: true
        currency:
          type: string
          example: ISK
          readOnly: true
        amount:
          type: number
          format: double
          example: 10000
          readOnly: true
        settles_to_employee:
          type: boolean
          example: true
          readOnly: true
          description: |
            Indicates if the payment is settled to the employee or the company.

            If true, the payment is settled to the employee. If false, the payment is settled to the company.

            This evaluates this payment and related data as it is exactly on time of fetch. Meaning that this flag has no relevance to already settled payments.
        settled_to:
          type: string
          description: The name of the settlement recipient.
          example: John The Cutter
          readOnly: true
        settlement:
          type: string
          example: 7awdXwZoedakjad37a
          readOnly: true
          description: The ID of the settlement that this payment belongs to.
        refunded_at:
          type: string
          format: date-time
          readOnly: true
        settled_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    PaymentCreate:
      type: object
      required: [reason, event]
      properties:
        reason:
          type: string
          format: enum
          enum: [noshow]
          example: "noshow"
        event:
          type: string
          example: 7awdXwZoedakjad37a

    PaymentStatus:
      type: string
      format: enum
      enum: [unsettled, settled, refunded, pending]
      example: "refunded"

    PaymentFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        from:
          type: string
          format: date-time
          example: "2020-08-24T14:15:22Z"
        to:
          type: string
          format: date-time
          example: "2022-08-24T14:15:22Z"
        settled_at:
          $ref: "#/components/schemas/DateFilter"
        company:
          deprecated: true
          type: string
          example: 7awdXwZoedakjad37a
          description: "Deprecated: Use ListPayments endpoint to get payments for a company"
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/PaymentStatus"

    PushNotificationFilter:
      type: object
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      properties:
        event_id:
          type: string
          example: 7awdXwZoedakjad37a
        customer_id:
          type: string
          example: 7awdXwZoedakjad37a

    TimeSlots:
      type: array
      items:
        $ref: "#/components/schemas/TimeSlot"

    TimeSlot:
      type: object
      properties:
        slot:
          type: string
          format: date-time
          description: "The start time of the time slot"
          example: "2020-08-24T15:00:00Z"
        employeeIds:
          type: array
          description: "The IDs of the employees that are available for this time slot"
          items:
            type: string
        resourceIds:
          type: array
          description: "The IDs of the resources that are available for this time slot"
          items:
            type: string
        unavailable_resources:
          type: array
          description: "Details of the resources and employees that are unavailable for this time slot, including the reason"
          items:
            $ref: "#/components/schemas/UnavailableResource"

    UnavailableResource:
      type: object
      properties:
        resource:
          type: string
          description: "The ID of the unavailable resource"
        reason:
          type: string
          format: enum
          enum:
            - booking
            - blocked_time
            - timeslot_reservation
            - outside_opening_hours
            - custom_booking_interval
            - capacity
          description: |
            The reason why the resource is unavailable.

            Possible values:
            - `booking` - The resource is occupied by a booking/event during this time slot
            - `blocked_time` - The resource is occupied by blocked time during this time slot
            - `timeslot_reservation` - The resource is occupied by a timeslot reservation during this time slot
            - `outside_opening_hours` - The reservation extends outside the opening hours of the company
            - `custom_booking_interval` - The reservation start time does not match the custom booking interval of the resource
            - `capacity` - The capacity of the resource does not match number of guests (Too big or too small)

            The above list of reasons is priority ordered. Meaning that if a resource has multiple occupying factors,
            the reason will be the highest priority one (bookings > timeslot reservations > blocked times).

    EventCheckinResult:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          properties:
            check_in_success_message:
              type: string
              example: "Thank you for checking in, please wait until your name is called"
            sale_id:
              type: string
              example: "8awud8w9a7d9w8a"
            transaction_id:
              type: string
              example: "8awud8w9a7d9w8a"
            subtransaction_id:
              type: string
              example: "8awud8w9a7d9w8a"
              description: |
                The ID of the subtransaction tied to this self-checkin.

                If the company does not have a terminal associated with their checkin, this ID will be empty.

    RRuleString:
      type: string
      example: "FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,TU,WE,TH,FR"
      description: |
        [RRULE](https://icalendar.org/iCalendar-RFC-5545/3-3-10-recurrence-rule.html) string for recurring events and blocked times.

        The dtstart property is ignored, and the start time of the event/blocked time is used instead.

        If no until is specified, it will default to 2 years from time of creation.

        Until has a maximum value of 2 years from time of creation.

        Count can be any value, but generated events/blocked times past the 2 year mark will be ignored.

    EventsCount:
      type: array
      items:
        $ref: "#/components/schemas/EventCount"

    EventCount:
      type: object
      properties:
        date:
          type: string
          example: "2022-09-12"
        count:
          type: integer
          example: 1

    Events:
      type: array
      items:
        $ref: "#/components/schemas/Event"

    Event:
      type: object
      title: Event
      properties:
        id:
          type: string
          readOnly: true
          example: 7awdXwZoedakjad37a
        recurring_event:
          oneOf:
            - $ref: "#/components/schemas/ID"
            - $ref: "#/components/schemas/Event"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        employee_name:
          type: string
          example: Joe The Cutter
          deprecated: true
          writeOnly: true
          readOnly: true
          description: Deprecated, expand employee property instead
        employee:
          $ref: "#/components/schemas/ExpandableEmployee"
        customer_name:
          type: string
          example: Harry Hairlong
          readOnly: true
          description: It is recommended to expand the customer property instead of using this property. However, in the case of deleted or walkin customers, this property can be used as fallback since the customer property will be null.
        new_customer:
          type: boolean
          example: true
          readOnly: true
          description: This value is true if this is the first booking for this customer
        customer:
          $ref: "#/components/schemas/ExpandableCustomer"
        number_of_guests:
          type: integer
          format: int32
          example: 1
          description: Number of guests for the event.
        space_name:
          type: string
          example: My Space
          deprecated: true
          writeOnly: true
          readOnly: true
          description: Deprecated, expand resource property instead
        space:
          deprecated: false
          oneOf:
            - $ref: "#/components/schemas/ID"
            - $ref: "#/components/schemas/Space"
          description: "Use resource instead"
        resources:
          $ref: "#/components/schemas/ExpandableResources"
        license_plate:
          type: string
          description: License plate for the vehicle associated with this event
        event_date:
          type: string
          example: "2022-09-12"
          deprecated: true
          writeOnly: true
          readOnly: true
          description: Deprecated, use starts_at instead
        start_time:
          type: string
          example: "15:30"
          deprecated: true
          writeOnly: true
          readOnly: true
          description: Deprecated, use starts_at instead
        end_time:
          type: string
          example: "16:00"
          deprecated: true
          writeOnly: true
          readOnly: true
          description: Deprecated, use ends_at instead
        starts_at:
          type: string
          format: date-time
          example: "2022-09-12T12:00:00Z"
          description: "Start time of event"
        ends_at:
          type: string
          format: date-time
          example: "2022-09-12T13:00:00Z"
          description: "End time of event"
          readOnly: true
        duration:
          type: integer
          format: int32
          example: 30
          readOnly: true
        check_in_at:
          type: integer
          format: int32
          example: 1600541746
          readOnly: true
        check_in_origin:
          type: string
        event_types:
          $ref: "#/components/schemas/EventTypes"
        variation_selections:
          $ref: "#/components/schemas/VariationSelections"
        invoice_status:
          $ref: "#/components/schemas/EventInvoiceStatus"
        status:
          type: string
          example: "noshow"
          description: |
            The status of the event.

            See [Event Statuses](#tag/Event-Statuses) for more information.
        claim_status:
          $ref: "#/components/schemas/ClaimStatus"
        origin:
          $ref: "#/components/schemas/EventOrigin"
        booking_source:
          $ref: "#/components/schemas/BookingSource"
        booking_questions:
          $ref: "#/components/schemas/LegacyBookingQuestions"
        booking_question_answers:
          $ref: "#/components/schemas/BookingQuestionAnswers"
        comment:
          type: string
        customer_comment:
          type: string
          description: A comment that the customer included during a marketplace booking.
        unconfirmed:
          type: boolean
          description: |
            Event is unconfirmed if the employee has not yet confirmed the booking.
            This is only relevant for companies that have the "Require employee confirmation" setting enabled.
        special:
          type: boolean
          description: A property that users can use to mark events as special. Has no affect on system behavior.
        pinned:
          type: boolean
          description: A property that users can use to pin events.
        tags:
          $ref: "#/components/schemas/EventTags"
        cancel_reason:
          readOnly: true
          type: string
          example: "I'm sick and can't make it"
          description: Provided by customers when they decline through the marketplace.
        sale:
          $ref: "#/components/schemas/ExpandableSale"
        payment:
          $ref: "#/components/schemas/ExpandablePayment"
        price:
          $ref: "#/components/schemas/CalculatedPrice"
        outstanding_no_show_fee:
          type: number
          format: double
          example: 1000
          description: |
            The amount of the no-show fee that is still outstanding.

            This is only relevant for events that have a no-show fee and the customer has not yet paid it.
        custom_properties:
          $ref: "#/components/schemas/CustomPropertyValues"
        notification_preferences:
          $ref: "#/components/schemas/NotificationPreferences"
        attachments:
          $ref: "#/components/schemas/Attachments"
        waitlist_entry:
          type: string
          description: |
            The ID of the waitlist entry that this event is associated with.

            Waitlist entries are automatically deleted when the event is created.
        booking_offer:
          $ref: "#/components/schemas/ExpandableBookingOffer"
        scheduled_event:
          $ref: "#/components/schemas/ExpandableScheduledEvent"
        ticket_id:
          type: string
          readOnly: true
          example: "A3B7C2K9"
          description: |
            A human-readable ticket ID for events created from scheduled events.
            Can be used for manual check-in of guests.
        rrule:
          $ref: "#/components/schemas/RRuleString"
        version:
          type: integer
          format: int32
          readOnly: true
          example: 1
          description: |
            The version of the event.

            This is incremented every time the event is updated.

            This is useful for detecting if an event has been updated since it was last fetched.
        created_by:
          $ref: "#/components/schemas/ExpandableActor"
        updated_by:
          $ref: "#/components/schemas/ExpandableActor"
        update_origin:
          $ref: "#/components/schemas/EventOrigin"
        accepted_at:
          type: string
          format: date-time
          description: |
            It is only possible to 'accept' and event once.
        declined_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
        rwg:
          $ref: "#/components/schemas/RwgConversionTracking"

    VariationSelections:
