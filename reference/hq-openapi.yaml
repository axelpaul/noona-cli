    AdminStaffWorkHoursBulkMigrationScope:
      type: string
      enum: [single, ruleset_tier, legacy_tier, all]

    AdminStaffWorkHoursBulkMigrationRequest:
      type: object
      required:
        - scope
      properties:
        scope:
          $ref: "#/components/schemas/AdminStaffWorkHoursBulkMigrationScope"
        company_id:
          type: string
          description: Required when scope is "single"
        limit:
          type: integer
          format: int32
          description: Max companies to process. Default 100, max 1000. Ignored for "single" scope.
        skip:
          type: integer
          format: int32
          description: Number of companies to skip before processing. Use with limit to paginate. Ignored for "single" scope.
        dry_run:
          type: boolean
          description: If true, return count without migrating

    AdminStaffWorkHoursBulkMigrationResult:
      type: object
      properties:
        total:
          type: integer
          format: int32
        migrated:
          type: integer
          format: int32
        skipped:
          type: integer
          format: int32
        failed:
          type: integer
          format: int32
        failures:
          type: array
          items:
            $ref: "#/components/schemas/AdminStaffWorkHoursBulkMigrationFailure"

    AdminStaffWorkHoursBulkMigrationFailure:
      type: object
      properties:
        company_id:
          type: string
        error:
          type: string

    AdminFixWorkHoursTimesScope:
      type: string
      enum: [single, all]

    AdminFixWorkHoursTimesRequest:
      type: object
      required:
        - scope
      properties:
