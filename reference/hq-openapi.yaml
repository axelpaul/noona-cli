        Needs a valid authorization code that was generated from the consent screen. Also needs the client_id and client_secret of the application.

        **Client Authentication:**
        The preferred method is HTTP Basic Authentication:
        ```
        Authorization: Basic base64(client_id:client_secret)
        ```

        For backwards compatibility, client_id and client_secret can also be passed as query parameters, but this is deprecated and will be removed in a future version.
      parameters:
        - name: client_id
          in: query
          required: false
          deprecated: true
          description: "Deprecated: Use HTTP Basic Authentication instead. Client ID of the application."
          schema:
            type: string
            example: ""
        - name: client_secret
          in: query
          required: false
          deprecated: true
          description: "Deprecated: Use HTTP Basic Authentication instead. Client secret of the application."
          schema:
            type: string
            example: ""
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
