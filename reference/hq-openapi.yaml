  /v1/hq/companies/{company_id}/events:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
        - oAuth 2.0:
            - events:read
      summary: List events
      description: |
        Lists events for a company with provided filters.
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
            example: "dwawd8awudawd"
        - name: from
          in: query
          required: false
          deprecated: true
          schema:
            type: string
            format: date-time
            example: "2022-09-12T00:00:00Z"
          description: "Use filter instead"
        - name: to
          in: query
          required: false
          deprecated: true
          schema:
            type: string
            format: date-time
            example: "2022-09-19T00:00:00Z"
          description: "Use filter instead"
        - in: query
          name: filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventFilter"
        - in: query
          name: sort
          description: "[Sorting](https://api.noona.is/docs/working-with-the-apis/sorting)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sort"
        - name: pagination
          in: query
          description: "[Pagination](https://api.noona.is/docs/working-with-the-apis/pagination)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagination"
        - name: phone_number
          in: query
          deprecated: true
          schema:
            type: string
            example: "8576251"
            description: "Phone number of customer. Deprecated, use filter instead."
        - name: phone_country_code
          in: query
          deprecated: true
          schema:
            type: string
            example: "354"
            description: "Phone country code of customer. Deprecated, use filter instead."
        - name: include_count_header
          in: query
          schema:
            type: boolean
            example: true
            default: false
            description: |
              Include count header in response.

              This is useful when you want to know the total count of events matching a query without fetching all the events.

              The count header `X-Total-Count` is included in the response headers.

              Note that performing a count operation can be **expensive and slow**, especially for large datasets.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Events"
          description: Events
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
      operationId: ListEvents
      tags:
        - Events

