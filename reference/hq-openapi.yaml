          type: array
          items:
            $ref: "#/components/schemas/ExpandableEmployee"
        line_items:
          $ref: "#/components/schemas/ExpandableLineItems"
        refunds:
          type: array
          items:
            type: string
            example: 8wa9uiah28dawd123
          description: References refunds for this transaction.
        refund_origin:
          type: string
          example: 8wa9uiah28dawd123
          description: References the original transaction that was refunded.
        invoice_number:
          type: integer
          format: int64
          example: 9001
          readOnly: true
        note:
          type: string
        issuer:
          $ref: "#/components/schemas/Issuer"
        fiscalization:
          type: string
        fiscalization_warning:
          type: string
          readOnly: true
          description: Warning message if fiscalization failed but transaction was completed
        currency:
          type: string
          example: ISK
        total_amount:
          description: Total amount with VAT
          example: 1990
          format: double
          type: number
          readOnly: true
        total_amount_without_vat:
          description: Total amount without VAT
          example: 1990
          format: double
          type: number
          readOnly: true
        vat_amount:
          example: 478
          format: double
          type: number
          description: Total VAT amount
          readOnly: true
        due_amount:
          description: Total amount due
          example: 990
          format: double
          type: number
          readOnly: true
        paid_on_marketplace_amount:
          example: 1000
          format: double
          type: number
          readOnly: true
          description: |
            Amount paid on marketplace during booking.

            Only applicable for bookings made on the marketplace.

            Example: Payment is $10 via voucher and remaining $5 via card. The value of this field would be $15.
        origin:
          type: string
          example: "marketplace"
          enum: [marketplace, pos]
          description: |
            The origin of the transaction.

            * marketplace: The transaction was created via the marketplace.
            * pos: The transaction was created via the POS.
        tax_exemption_reason:
          example: M01
          type: string
          description: The VAT exemption reason when the VAT amount is equal to 0
          readOnly: true
        type:
          type: string
          example: "invoice"
          enum: [invoice, return, refund, refunded]
        status:
          type: string
          example: "draft"
          enum: [draft, completed]
        drafted_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        voided_at:
          type: string
          format: date-time
          description: Only supported to unset this field. That is done by providing the value as "zero date" (0001-01-01T00:00:00Z)
        invopop_header:
          $ref: "#/components/schemas/InvopopHeader"
          description: Invopop fiscalization header data (UUID, stamps, invoice ID)
          readOnly: true

    ExpandableTransaction:
      description: "[Expandable](https://api.noona.is/docs/working-with-the-apis/expandable_attributes)"
