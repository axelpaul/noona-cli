    RefundMarketplaceSaleError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          properties:
            code:
              type: string
              enum:
                [
                  payment_has_been_settled,
                  already_refunded,
                  sale_has_been_mutated,
                ]
              description: |
                The error code. Only populated for certain errors.

                - `payment_has_been_settled`: The payment has already been settled and cannot be refunded.
                - `already_refunded`: The payment has already been refunded.
                - `sale_has_been_mutated`: The sale has been mutated and cannot be refunded automatically.

    CreatePaymentError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          properties:
            code:
              $ref: "#/components/schemas/CreatePaymentErrorCode"

    CreatePaymentErrorCode:
      type: string
      enum:
        - unableToProcessPayment # legacy value kept
        - notSufficientFunds
        - invalidCard
        - invalidCardNumber
        - expiredCard
        - paymentDeclined
        - unknownPaymentError
      description: |
        The error code. Only populated for certain errors.

        - `unable_to_process_payment`: Charging the card for the noshow fee failed.
        - `not_sufficient_funds`: The card has insufficient funds.
        - `invalid_card`: The card is invalid.
        - `invalid_card_number`: The card number is invalid.
        - `expired_card`: The card is expired.
        - `payment_declined`: The payment was declined by the issuer.
        - `unknown_payment_error`: An unknown payment error occurred.

