        spaces:
          type: array
          items:
            type: string
          example: ["space1", "space2"]
          description: Filter events by space/resource IDs
        event_type_ids:
          type: array
          items:
            type: string
          example: ["type1", "type2"]
          description: Filter events by event type ID
        include_deleted:
          type: boolean
          default: false
          description: Include deleted events in the count
      required:
        - from
        - to

    EventFilter:
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      allOf:
        - $ref: "#/components/schemas/CalendarSlotFilter"
        - type: object
          properties:
            customer:
              deprecated: true
              type: string
              example: 7awdXwZoedakjad37a
              description: Use `customers` instead.
            customers:
              description: "Filter by customer IDs"
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
            phone_number:
              type: string
              example: "8576251"
              description: "Filter by phone number of customer"
            phone_country_code:
              type: string
              example: "354"
              description: "Filter by phone country code of customer"
            from:
              type: string
              format: date-time
              description: |
                Only return events where starts_at is after this timestamp.

                _Mutually exclusive with overlap filter_
            to:
              type: string
              format: date-time
              description: |
                Only return events where starts_at is before this timestamp.

                _Mutually exclusive with overlap filter_
            overlaps_from:
              type: string
              format: date-time
              description: |
                Only return events that overlap with this timestamp or later.

                _Mutually exclusive with from/to filter_
            overlaps_to:
              type: string
              format: date-time
              description: |
                Only return events that overlap with this timestamp or earlier.

                _Mutually exclusive with from/to filter_
            exclude:
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
              description: "Exclude specific event IDs from response"
            ids:
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
              description: "Filter by specific event IDs"
            updated_from:
              type: string
              format: date-time
              description: Only return events where updated_at is after this timestamp.
            include_deleted:
              type: boolean
              default: false
              description: |
                Whether to include deleted events in the response.

                When true, deleted events will be included in the response.

                When false, deleted events will not be included in the response.
            origins:
              $ref: "#/components/schemas/EventOrigins"
            statuses:
              type: array
              items:
                type: string
                example: "noshow"
              description: |
                The status of the event.

                See [Event Statuses](#tag/Event-Statuses) for more information.
            event_type_ids:
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
              description: Filter by event type IDs
            scheduled_event_ids:
              type: array
              items:
                type: string
              description: Filter by scheduled event IDs
            ticket_id:
              type: string
              example: "A3B7C2K9"
              description: Filter by ticket ID
            custom_property_ids:
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
              description: Filter by custom property IDs
            custom_property_values:
              type: array
              items:
                type: string
                example: hair
              description: Filter by custom property values
            invoice_statuses:
              type: array
              items:
                $ref: "#/components/schemas/EventInvoiceStatus"
              description: Filter by invoice status
            created_by:
              type: array
              items:
                type: string
                example: 7awdXwZoedakjad37a
              description: Filter by created_by ID
            groups:
              type: array
              items:
                $ref: "#/components/schemas/BookingSourceGroup"
              description: Filter by booking source groups
            channels:
              type: array
              items:
                $ref: "#/components/schemas/BookingSourceChannel"
              description: Filter by booking source channels
            funnels:
              type: array
              items:
                $ref: "#/components/schemas/BookingSourceFunnel"
              description: Filter by booking source funnels
            created_from:
              type: string
              format: date-time
              description: Only return events where created_at is after this timestamp.
            created_to:
              type: string
              format: date-time
              description: Only return events where created_at is before this timestamp.

    NotificationOrigin:
      type: string
      enum: [customer]
      description: |
        Controls the notification style for this event operation.

        When set to `marketplace`, the system treats this event as a customer-initiated
        booking for notification purposes. This triggers marketplace-style notifications:
        - In-app HQ notification framed as "customer booked" (not "staff booked")
        - Confirmation email to the customer
        - Push notification to the customer (if eligible)
        - Push notification to the assigned employee

        When omitted, standard HQ notification behavior applies (controlled by `notify`).

        This is intended for partner integrations (e.g., Reserve with Google) where events
        are created via the HQ API but are customer-initiated.

    EventCreationBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        notify:
          type: boolean
          default: false
          description: |
            Whether to notify customer about the event.

            When true, the customer will receive an email and push notification about the event.

            When false, the customer will not receive any notification about the event.
        booking_offer:
          type: boolean
          default: false
          description: |
            Whether to send a booking offer to the customer when the event is created.

            When false, no booking offer will be sent to the customer.

            When true, the event payload must fit the following criteria:
            - The status must be 'hold'
            - The booking_offer payload must be provided in the request body.
        notification_origin:
          $ref: "#/components/schemas/NotificationOrigin"

    EventUpdateBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        notify:
          type: boolean
          default: false
          description: |
            Whether to notify customer about the event update.

            When true, the customer will receive an email and push notification about the event update.

            When false, the customer will not receive any notification about the event update.
        type:
          type: string
          format: enum
          enum: [detach, inplace, future]
          default: detach
          example: "detach"
          description: |
            What events to update when updating an event that is a part of a recurring event.

            - `detach` - Only update the referenced event and detach it from the series
            - `inplace` - Only update the referenced event but keep it a part of the series
            - `future` - Update referenced event and all events in the series after the referenced event
        notification_origin:
          $ref: "#/components/schemas/NotificationOrigin"

    ScheduledEventUpdateBehavior:
      type: object
      description: Behavior options for updating a scheduled event.
      properties:
        notify:
          type: boolean
          default: false
          description: |
            Whether to notify customers about the scheduled event update.

            When true, customers with bookings for this scheduled event will receive
            a notification about the rescheduled booking.

            When false, no notifications will be sent.

    EventDeletionBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        type:
          type: string
          format: enum
          enum: [single, future]
          default: single
          example: "single"
          description: |
            What events to delete when deleting an event that is a part of a recurring event.

            - `single` - Only delete the referenced event
            - `future` - Delete referenced event and all events in the series after the referenced event
        notify:
          type: boolean
          default: false
          description: |
            Whether to notify customer about the event deletion.

            When true, the customer will receive an email and push notification about the event deletion.
        notification_origin:
          $ref: "#/components/schemas/NotificationOrigin"

    MozrestQueryBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        type:
          type: string
          format: enum
          enum: [local, mozrest]
          default: local
          example: local
          description: |
            Whether to only use the cached data within Noona or to fetch the data from Mozrest.

            When `local` is used. The **status** and **install_link** attributes are not populated.

    BlockedTimeFilter:
      description: "[Filtering](https://api.noona.is/docs/working-with-the-apis/filtering)"
      allOf:
