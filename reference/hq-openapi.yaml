  /v1/hq/stream/companies/{company_id}:
    parameters:
      - $ref: "#/components/parameters/select"
      - $ref: "#/components/parameters/expand"
    get:
      security:
        - BearerTokenAuth: []
      summary: Stream updates
      description: |
        Streams updates for specified entity types for a company.

        This is a generic stream endpoint that allows clients to subscribe to real-time updates
        for specific types of entities. The client specifies which entity types to monitor
        through the filter parameter, and will receive notifications whenever those entities
        are created, updated, or deleted.

        The stream uses Server-Sent Events (SSE) protocol and maintains a persistent connection
        to deliver real-time updates.

        ## Event Names

        The endpoint emits typed SSE events based on the entity type that was updated.
        See the `StreamEventName` schema for all possible event names and their meanings.

        Each event name follows the pattern `on{EntityType}Updated` (singular form):
        - `events` entity type → `onEventUpdated` event name
        - `products` entity type → `onProductUpdated` event name
        - `notifications` entity type → `onNotificationUpdated` event name
        - ... etc.

        ## Response Format

        The stream returns Server-Sent Events with typed event names and empty JSON objects as payload.

        The JSON payload could include metadata about the update in the future.

        ```
        event: onEventUpdated
        data: {}

        event: onProductUpdated
        data: {}
        ```

        ## Client Usage

        ```javascript
        const eventSource = new EventSource('/v1/hq/stream/companies/123?filter={"entity_types":["events","products"]}');

        eventSource.addEventListener('onEventUpdated', (event) => {
          console.log('An event was updated!');
          // Refresh your events data
        });

        eventSource.addEventListener('onProductUpdated', (event) => {
          console.log('A product was updated!');
          // Refresh your products data
        });
        ```
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
            example: "dwawd8awudawd"
        - in: query
          name: filter
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericStreamFilter"
      responses:
        "200":
          description: |
            Server-Sent Events stream with typed event names.

            Events are emitted with names from the `StreamEventName` enum
            and contain empty JSON objects as data.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events format with typed event names.

                  Each event follows the format:
                  ```
                  event: {StreamEventName}
                  data: {}
                  ```
              examples:
                event_updated:
                  summary: Event Updated
                  value: |
                    event: onEventUpdated
                    data: {}

                product_updated:
                  summary: Product Updated
                  value: |
                    event: onProductUpdated
                    data: {}

                multiple_events:
                  summary: Multiple Entity Updates
                  value: |
                    event: onEventUpdated
                    data: {}

                    event: onProductUpdated
                    data: {}

                    event: onNotificationUpdated
                    data: {}
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
      operationId: StreamUpdates
      tags:
        - Companies

