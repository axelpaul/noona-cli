          type: string
          description: Reason for rejection (required when status is 'rejected')
      required:
        - status

    VerificationRequestsFilter:
      type: object
      properties:
        status:
          type: array
          items:
            $ref: "#/components/schemas/VerificationStatus"
          description: Filter by verification status

    AllPricing:
      type: array
      items:
        $ref: "#/components/schemas/Pricing"

    Pricing:
      type: object
      properties:
        country_code:
          example: IS
          type: string
        currency:
          example: ISK
          type: string
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"
    Price:
      type: object
      properties:
        title:
          example: Base fee
          type: string
        trial_units:
          example: 14
          type: integer
          format: int32
        amount:
          example: 2990
          format: double
