          format: int32
        skipped:
          type: integer
          format: int32
        failed:
          type: integer
          format: int32
        failures:
          type: array
          items:
            $ref: "#/components/schemas/AdminFixWorkHoursTimesFailure"

    AdminFixWorkHoursTimesFailure:
