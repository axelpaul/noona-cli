        max_capacity:
          type: integer
          format: int32
          example: 300
          description: Maximum number of guests for this tier.
        min_group_size:
          type: integer
          format: int32
          example: 1
          description: Minimum guests per booking.
        max_group_size:
          type: integer
          format: int32
          example: 4
          description: Maximum guests per booking.
        currency:
          type: string
          example: "USD"
        variations:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ScheduledEventVariation"
        marketplace_visible:
          type: boolean
          example: true
          description: Whether this tier is available for online bookings.
        payment_settings:
          $ref: "#/components/schemas/PaymentSettings"
        confirmation_message_translations:
          $ref: "#/components/schemas/TranslationMap"
        booking_questions:
          $ref: "#/components/schemas/ScheduledEventBookingQuestions"
        vat:
          $ref: "#/components/schemas/ExpandableVAT"
        tax_exemption_reason:
          type: string
          description: |
            The reason for tax exemption. This is only used if the tier is tax exempt.
            If the tier is not tax exempt, this field is ignored.

    ScheduledEventTierResponse:
      type: object
      description: Tier in scheduled event response with availability.
      properties:
