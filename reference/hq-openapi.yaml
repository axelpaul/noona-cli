        token:
          type: string
          example: c33d249421c46ae3f0962d5449cfabd8d43c7aa634789afb4e65fa9d94f94138
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true

    PushToken:
      type: object
      required:
        - token
        - platform
      properties:
        token:
          type: string
          example: 7awdXawZoolkjad37a
        platform:
          type: string
          format: enum
          enum: [ios, android]
          example: ios
        created_at:
          type: string
          format: date-time
          readOnly: true

    CheckinToken:
      type: object
      properties:
        token:
          type: string
          example: c33d249421c46ae3f0962d5449cfabd8d43c7aa634789afb4e65fa9d94f94138
          readOnly: true

    CreateUserInviteRequest:
      type: object
      description: Request to create a new user invite. No parameters are required as the API controls all settings.

      properties:
        company_id:
          type: string
          description: ID of the company this user invite will belong to

    UserInvite:
      type: object
      description: A user invite to join a company
      properties:
        id:
          type: string
          readOnly: true
          description: Unique identifier for the user invite
        company_id:
          type: string
          readOnly: true
          description: ID of the company this user invite belongs to
        employee_id:
          type: string
          readOnly: true
          description: ID of the employee who created this user invite
        user_id:
          type: string
          readOnly: true
          nullable: true
          description: ID of the specific user who can consume this invite (empty for general invites)
        token:
          type: string
          readOnly: true
          description: Unique token for the user invite
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: When the user invite expires
        consumed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the user invite was used (null if not used)
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When the user invite was created
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: When the user invite was last updated
        is_expired:
          type: boolean
          readOnly: true
          description: Whether the user invite has expired
        is_used:
          type: boolean
          readOnly: true
          description: Whether the user invite has been used
        is_valid:
          type: boolean
          readOnly: true
          description: Whether the user invite is still valid (not expired, used, or deleted)

    UserInvites:
      type: array
      items:
        $ref: "#/components/schemas/UserInvite"

    UserInviteContextResponse:
      type: object
      description: Result of validating a user invite without consuming it
      required:
        - company_id
        - company_name
        - is_valid
        - expires_at
      properties:
        company_id:
          type: string
          readOnly: true
          description: ID of the company this user invite belongs to
        company_name:
          type: string
          readOnly: true
          description: Name of the company this user invite belongs to
        invited_by:
          type: string
          readOnly: true
          description: Name of the user who created this user invite
        email:
          type: string
          readOnly: true
          description: Email of the invited user (only present for email invites)
        has_password:
          type: boolean
          readOnly: true
          description: Whether the invited user already has a password (only present for email invites)
        is_valid:
          type: boolean
          readOnly: true
          description: Whether the user invite is still valid (not expired, used, or deleted)
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: When the user invite expires

    ConsumeUserInviteRequest:
      type: object
      description: Optional request body for consuming a user invite
      properties:
        name:
          type: string
          description: Profile name to set for the user at this company
          example: John Doe

