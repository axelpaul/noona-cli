    Transaction:
      type: object
      title: Transaction
      properties:
        id:
          type: string
          example: 8wa9uiah28dawd123
          readOnly: true
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        sale:
          $ref: "#/components/schemas/ExpandableSale"
