        - event_statuses:read
        - event_statuses:write
        - event_type_groups:read
        - event_type_groups:write
        - event_types:read
        - event_types:write
        - events:read
        - events:write
        - issuers:read
        - memos:read
        - memos:write
        - metrics:read
        - notifications:read
        - notifications:write
        - payment_methods:read
        - payment_methods:write
        - payments:read
        - payments:write
        - product_groups:read
        - product_groups:write
        - products:read
        - products:write
        - properties:read
        - properties:write
        - push_notifications:read
        - reminders:read
        - reminders:write
        - resources:read
        - resources:write
        - rule_set_templates:read
        - rule_set_templates:write
        - rule_sets:read
        - rule_sets:write
        - sales:read
        - sales:write
        - settlements:read
        - scheduled_events:read
        - scheduled_events:write
        - sms_messages:read
        - terminals:read
        - terminals:write
        - time_slots:read
        - user:read
        - user:write
        - voucher_templates:read
        - voucher_templates:write
        - vouchers:read
        - vouchers:write
        - waitlists:read
        - waitlists:write
        - reports:write
        - files:read
        - files:write
        - images:write

