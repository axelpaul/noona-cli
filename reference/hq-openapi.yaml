        - event_id
        - vat_id
      properties:
        payor_id:
          type: string
          description: Unique identifier of the payor (typically the customer responsible for the claim).
        payor_ssn:
          type: string
          description: Social security number of the payor.
        company_id:
          type: string
          description: Unique identifier of the company associated with this claim.
        event_id:
          type: string
          description: Unique identifier of the event for which the claim is being made.
        vat_id:
          type: string
          description: Unique identifier of the VAT percentage to be used for the claim.
        amount:
          type: number
          format: double
          description: Total monetary value of the claim.
        ratio:
          type: number
          format: double
          minimum: 1
          maximum: 100
          description: Proportional share of the event cost to be paid, expressed as a percentage (1–100).
        notify_customer:
          type: boolean
          description: Whether to notify the customer via sms about the claim.

