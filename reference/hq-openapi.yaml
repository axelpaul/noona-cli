        company_id:
          type: string
          description: Required when scope is "single"
        limit:
          type: integer
          format: int32
          description: Max companies to process. Default 100, max 1000. Ignored for "single" scope.
        dry_run:
          type: boolean
          description: If true, return count without fixing

    AdminFixWorkHoursTimesResult:
      type: object
      properties:
        total:
          type: integer
          format: int32
        fixed:
