      type: array
      items:
        $ref: "#/components/schemas/Application"

    Application:
      type: object
      properties:
        id:
          type: string
          example: 7awdXwZoedakjad37a
        logo:
          type: string
          example: "https://example.com/logo.png"
        name:
          type: string
          example: "King Accounting Connection"
          description: Shown to the user when they are asked to give consent.
        name_translations:
          $ref: "#/components/schemas/TranslationMap"
        developer_name:
          type: string
          example: "King Accounting"
        developer_url:
          type: string
          example: "https://example.com/about_king_accounting"
          description: Home page or documentation for your application.
        description:
          type: string
          example: "King Accounting Connection automatically syncs your Noona POS system with the King Accounting software."
          description: Short text about the functionality of the app that appears next to the icon in the list.
        description_translations:
          $ref: "#/components/schemas/TranslationMap"
        uninstall_message:
          type: string
          example: "Note that all data that the app stored will be deleted."
          description: Short text that is displayed to the user when uninstalling the app.
        uninstall_message_translations:
          $ref: "#/components/schemas/TranslationMap"
        about:
          type: string
          description: A longer description of the application which opens in a modal and support HTML.
        redirect_uris:
          type: array
          items:
            type: string
            example: "https://example.com"
        scopes:
          $ref: "#/components/schemas/OAuthScopes"
        public:
          type: boolean
          example: true
          description: If true, the application will be usable from outside of the company.
        app_store:
          type: boolean
          example: true
          description: If true, the application will be listed in the Noona App Store.
        show_in_navigation:
          type: boolean
          example: true
          description: |
            If `true`, the application will appear in the navigation within Noona HQ.

            When clicked, the application's main redirect_uri will be displayed in an iFrame.
        verticals:
          type: array
          items:
            $ref: "#/components/schemas/CompanyVertical"
          example: ["restaurant", "appointment"]
          description: |
            The verticals the application is available in.

            If omitted or empty, the application is available for all verticals.
        countries:
          type: array
          items:
            type: string
            description: ISO 3166-1 alpha-2 country code
          example: ["US", "CA"]
          description: |
            The countries the application is available in.

            If omitted or empty, the application is available in all countries.
        payment_type:
          type: string
          enum: [free, one-time, subscription]
          example: free
        price:
          type: integer
          format: int32
          example: 1000
          description: Price in x100 format. (100 is 1.00)
        currency:
          type: string
          example: "ISK"
        client_id:
          type: string
          example: 7awdXwZoedakjad37a
          readOnly: true
        client_secret:
          type: string
          example: 7awdXwZoedakjad37a7awdXwZoedakjad37a7awdXwZoedakjad37a
          readOnly: true
        approved:
          type: boolean
          example: true
        created_at:
