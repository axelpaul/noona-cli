      properties:
        type:
          type: string
          format: enum
          enum: ["terminal"]
        terminal_id:
          type: string
          example: 9d8aj2oi2audawo

    SubtransactionDataVoucher:
      type: object
      writeOnly: true
      required:
        - type
        - voucher_id
      properties:
        type:
          type: string
          format: enum
          enum: ["voucher"]
        voucher_id:
          type: string
          example: 9d8aj2oi2audawo

    SubtransactionDataPrePayment:
      type: object
      writeOnly: true
      required:
        - type
        - payment_id
      properties:
        type:
          type: string
          format: enum
          enum: ["pre_payment"]
        payment_id:
          type: string
          example: 9d8aj2oi2audawo

    SubtransactionDataPaylink:
      type: object
      writeOnly: true
      required:
        - type
        - phone_country_code
        - phone_number
      properties:
        type:
          type: string
          format: enum
          enum: ["paylink"]
        paylink_payment_id:
          type: string
          readOnly: true
        paylink_payment_group_id:
          type: string
          readOnly: true
        phone_country_code:
          type: string
          example: 354
        phone_number:
          type: string
          example: 5812345
        channel:
          readOnly: true
          type: string
          format: enum
          enum: ["app", "sms"]

    SubtransactionDataVerifoneTerminal:
      type: object
      writeOnly: true
      required:
        - type
        - terminal_id
        - merchant_id
      properties:
        type:
          type: string
          format: enum
          enum: ["verifone"]
        terminal_id:
          type: string
          example: 123-321-220
        merchant_id:
          type: string
          example: ABCD1234

    SubtransactionDataStraumurTerminal:
      type: object
      writeOnly: true
      required:
        - type
        - terminal_id
        - merchant_id
      properties:
        type:
          type: string
          format: enum
          enum: ["straumur"]
        terminal_id:
          type: string
          example: V400m-324688297
        merchant_id:
          type: string
          example: NoonaMerchant123

    CustomerDeletionBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        type:
          type: string
          format: enum
          enum: [soft, remove_traces]
          default: soft
          example: "soft"
          description: |
            Specifies the behavior when deleting a customer.

            - `soft`          - Updates the `deleted_at` property on the customer.
            - `remove_traces` - Removes all references of the customer from past events and the phone number from past SMS messages.

    SubtransactionCreationBehavior:
      type: object
      description: "[Behavior](https://api.noona.is/docs/working-with-the-apis/behavior)"
      properties:
        type:
          type: string
          default: single
          format: enum
          enum: [single, split]
          description: |
            The type of subtransaction to create.

            Single will create a single subtransaction for the transaction.

            Split will create subtransactions on all transactions in the sale with the remaining amount of each transation.

