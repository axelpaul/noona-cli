        teya:
          $ref: "#/components/schemas/TeyaConnection"
        verifone:
          $ref: "#/components/schemas/VerifoneConnection"
        straumur:
          $ref: "#/components/schemas/StraumurConnection"
        commissions:
          $ref: "#/components/schemas/EmployeeCommissions"
        disabled_at:
