          format: int32
          description: The number of seats purchased with the subscription plan.
        billing_period_unit:
          type: string
          enum: [month, year]
          description: The billing period unit for the subscription plan (month or year).
        trial_expired:
          type: boolean
          readOnly: true
          description: |
