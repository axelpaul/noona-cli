        type: string
      example:
        is: "King Accounting tenging"
        fr: "Connexion King Accounting"

    PaymentMethodInstances:
      type: array
      items:
        $ref: "#/components/schemas/PaymentMethodInstance"

    PaymentMethodInstance:
      type: object
      required:
        - id
        - company
        - payment_method
        - title
        - order
        - enabled
        - available
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: "comp_pm_123456"
        company:
          $ref: "#/components/schemas/ExpandableCompany"
        payment_method:
          $ref: "#/components/schemas/ExpandablePaymentMethod"
        is_custom:
          type: boolean
          example: true
        title:
          type: string
          example: "Cash"
        title_translations:
          type: object
          additionalProperties:
            type: string
          example:
            "en": "Cash"
            "is": "Reiðufé"
        order:
          type: integer
          format: int32
          example: 0
        enabled:
          type: boolean
          example: true
        available:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2025-04-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-04-01T12:00:00Z"

    CreatePaymentMethodInstanceRequest:
      type: object
      required:
        - company
        - payment_method
        - title
      properties:
        company:
          type: string
          example: "abc123"
        payment_method:
          type: string
          example: "HvMpDGJq9dFLb2Tgv"
        title:
          type: string
          example: "Custom Gift Voucher"
        enabled:
          type: boolean
          example: true
          default: true

    UpdatePaymentMethodInstanceRequest:
      type: object
      properties:
        order:
          type: integer
          format: int32
          example: 3
          description: New position for this payment method. Other methods will be reordered automatically.
        enabled:
          type: boolean
          example: true
          description: Whether this payment method is enabled for the company.
        title:
          type: string
          example: "New Custom Gift Voucher"
          description: Display name of the payment method.

    PaymentMethodInstancesFilter:
      type: object
      properties:
        status:
          type: array
          items:
            type: string
            enum: [active, inactive]
        payment_method_ids:
          type: array
          items:
            type: string
          description: Filter by one or more payment method IDs.

    RwgConversionTracking:
      type: object
      description: Google Reserve with Google conversion tracking data
      properties:
        token:
          type: string
          description: Google rwg_token for conversion tracking
          example: "AJKvS9WeONmWKEwjG0--HdpzMq0yAVNL8KMxbb44QtbcxMhSx_NUud5b8PLUBFehAIxOBO-iYRIJOknEFkIJmdsofdVJ6uOweQ=="
        merchant_changed:
          type: string
          description: Merchant changed indicator for Google conversion tracking
          enum: ["1", "2"]
          example: "2"
      required:
        - token
        - merchant_changed

    ImportJobStatus:
      type: string
      enum: [pending, processing, completed, failed]
      description: Status of the import job

    ImportJobType:
      type: string
      enum: [events, customers, event_types, products, waitlist_entries]
      description: Type of data being imported

    ImportJobCreate:
      type: object
      required:
        - company_id
        - type
        - file_size
        - row_count
      properties:
        company_id:
          type: string
          description: ID of the company
          example: "dwawd8awudawd"
        type:
          $ref: "#/components/schemas/ImportJobType"
        file_size:
          type: integer
          format: int32
          description: Size of the file in bytes
          example: 1024000
        row_count:
          type: integer
          format: int32
          description: Number of rows in the import file
          example: 500

    ImportJob:
      type: object
      required:
        - id
        - company
        - type
        - status
        - file_size
        - row_count
        - upload_url
        - upload_expiry
        - created_at
        - updated_at
        - created_by
      properties:
        id:
          type: string
          example: "7awdXwZoedakjad37a"
          readOnly: true
        company:
          type: string
          description: ID of the company
          example: "dwawd8awudawd"
        type:
          $ref: "#/components/schemas/ImportJobType"
        status:
          $ref: "#/components/schemas/ImportJobStatus"
        file_size:
          type: integer
          format: int32
          description: Size of the file in bytes
          example: 1024000
        row_count:
          type: integer
          format: int32
          description: Total number of rows in the import file
          example: 500
        upload_url:
          type: string
          format: uri
          description: Pre-signed URL for file upload (valid for 15 minutes)
        upload_expiry:
          type: string
          format: date-time
          description: When the upload URL expires
        processed_rows:
          type: integer
          format: int32
          description: Number of rows processed so far
          example: 250
        success_rows:
          type: integer
          format: int32
          description: Number of rows processed successfully
          example: 240
        error_rows:
          type: integer
          format: int32
          description: Number of rows that failed processing
          example: 10
        error_messages:
          type: array
          items:
            type: string
          description: List of error messages from processing
          example:
            ["Row 5: Invalid email format", "Row 12: Missing required field"]
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          description: ID of the user who created the import job
          example: "user123"

    InvopopHeader:
      type: object
      description: Invopop fiscalization header information extracted from GOBL envelope
      properties:
        uuid:
          type: string
          example: "0199dd45-e893-7208-ac79-8f4fe5449e04"
          description: GOBL envelope UUID
        code:
          type: string
          example: "FR IXTEST-01/8849"
          description: Full invoice identifier
        digest:
          $ref: "#/components/schemas/InvopopDigest"
        stamps:
          type: array
          items:
            $ref: "#/components/schemas/InvopopStamp"

    InvopopDigest:
      type: object
      description: Cryptographic digest of the invoice document
      properties:
        algorithm:
          type: string
          example: "sha256"
          description: Hash algorithm used
        value:
          type: string
          example: "ead24e3c59a8b23f4953145566c8371e1c5b8d86280612654531b421d263e89d"
          description: Hash value (hex encoded)

    InvopopStamp:
      type: object
      description: Fiscal stamp from tax authority
      properties:
        provider:
          type: string
          example: "at-atcud"
          description: Stamp provider code (e.g., at-atcud, at-qr, at-hash)
        value:
          type: string
          example: "AAJFJRJYD4-8849"
          description: Stamp value from the authority

    SendTransactionReceiptRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          example: example@example.com

    AITranslationEntityType:
      type: string
      enum:
        - event_type
        - company

    AITranslationField:
      type: object
      required:
        - key
        - text
      properties:
        key:
          type: string
          description: The field name being translated
          maxLength: 100
          example: "title"
        text:
          type: string
          description: The source text to translate
          maxLength: 5000
          example: "Haircut"

    AITranslationCreate:
      type: object
      required:
        - entity_type
        - source_language
        - target_languages
        - fields
      properties:
        entity_type:
          $ref: "#/components/schemas/AITranslationEntityType"
        entity_id:
          type: string
          description: The ID of the entity being translated
          example: "abc123"
        source_language:
          type: string
          description: The language code of the source text
          pattern: "^[a-z]{2}$"
          example: "en"
        target_languages:
          type: array
          items:
            type: string
            pattern: "^[a-z]{2}$"
          maxItems: 7
          description: The language codes to translate to
          example: ["is", "pt"]
        fields:
          type: array
          items:
            $ref: "#/components/schemas/AITranslationField"
          maxItems: 20

    AITranslation:
      type: object
      properties:
        translations:
          type: object
          description: Map of field names to language translations
          additionalProperties:
            type: object
            additionalProperties:
              type: string

    AgentClient:
      type: object
      required:
        - id
        - name
        - client_id
        - masked_client_secret
        - scopes
        - global
        - created_by
        - created_at
      properties:
        id:
          type: string
        name:
          type: string
          example: "Support Triage Bot"
        client_id:
          type: string
          example: "nac_a1b2c3d4"
        masked_client_secret:
          type: string
          example: "nacs_*****a1b2"
        scopes:
          $ref: "#/components/schemas/AgentClientScopes"
        global:
          type: boolean
          description: Whether this agent client has global (cross-company) access. Defaults to true.
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentClientCreated:
      allOf:
        - $ref: "#/components/schemas/AgentClient"
        - type: object
          required:
            - client_secret
          properties:
            client_secret:
              type: string
              description: The raw client secret. Only returned on creation.
              example: "nacs_7f3a..."

    AgentClients:
      type: array
      items:
        $ref: "#/components/schemas/AgentClient"

    AgentClientCreate:
      type: object
      required:
        - name
        - scopes
      properties:
        name:
          type: string
          example: "Support Triage Bot"
        scopes:
          $ref: "#/components/schemas/AgentClientScopes"
        global:
          type: boolean
          description: Whether this agent client has global (cross-company) access.

    AgentClientUpdate:
      type: object
      properties:
        name:
          type: string
        scopes:
          $ref: "#/components/schemas/AgentClientScopes"
        global:
          type: boolean
          description: Whether this agent client has global (cross-company) access.

    SMSPricing:
      type: object
      properties:
        price_per_segment:
          type: integer
          format: int64
          description: Price per SMS segment in the smallest currency unit.
        currency:
          type: string
          description: The currency code for the price.
        item_price_id:
          type: string
          description: The Chargebee item price ID for this pricing.

    CreditWalletType:
      type: string
      enum: [sms]

    CreditWalletFilter:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/CreditWalletType"

    CreditWallet:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        company:
          type: string
        type:
          $ref: "#/components/schemas/CreditWalletType"
        balance:
          type: integer
          format: int64
        currency:
          type: string
        low_balance_threshold:
          type: integer
          format: int64
        auto_top_up:
          $ref: "#/components/schemas/CreditWalletAutoTopUp"
        free_allowance:
          $ref: "#/components/schemas/CreditWalletFreeAllowance"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    CreditWalletFreeAllowance:
      type: object
      properties:
        limit:
          type: integer
          format: int32
          description: Total free allowance available per billing cycle.
        used:
          type: integer
          format: int32
          description: Allowance consumed in the current cycle.
        period_start:
          type: string
          format: date-time
          description: When the current allowance cycle started.

    CreditWallets:
      type: array
      items:
        $ref: "#/components/schemas/CreditWallet"

    CreditWalletAutoTopUp:
      type: object
      properties:
        enabled:
          type: boolean
        threshold:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        item_price_id:
          type: string

    CreditWalletPurchase:
      type: object
      required:
        - item_price_id
        - payment_intent_id
      properties:
        item_price_id:
          type: string
          description: The Chargebee item price ID for the credit pack to purchase.
        payment_intent_id:
          type: string
          description: |
            The Chargebee authorization transaction ID obtained client-side via Chargebee.js.
            The intent must be authorized for an amount equal to the credit pack's price and
            belong to the authenticated company. Server validates both before creating the invoice.

    CreditWalletAutoTopUpUpdate:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        threshold:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        item_price_id:
          type: string

    CreditLedgerEntries:
      type: array
      items:
        $ref: "#/components/schemas/CreditLedgerEntry"

    CreditLedgerEntry:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        wallet:
          type: string
        company:
          type: string
        amount:
          type: integer
          format: int64
        balance:
          type: integer
          format: int64
        description:
          type: string
        source:
          $ref: "#/components/schemas/CreditLedgerEntrySource"
        source_id:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true

    CreditLedgerEntrySource:
      type: string
      enum:
        - custom
        - top_up
        - refund
        - auto_top_up
