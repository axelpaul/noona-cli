      oneOf:
        - $ref: "#/components/schemas/OAuthScope"
        - $ref: "#/components/schemas/AgentExclusiveScope"

    AgentClientScopes:
      type: array
      items:
        $ref: "#/components/schemas/AgentClientScope"

    OAuthConsentResponse:
      type: object
      properties:
        redirect_uri:
          type: string
          example: "https://example.com/?code=x&state=y"

    OAuthTokenRequest:
      type: object
      required:
        - "grant_type"
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        grant_type:
          type: string
          format: enum
          enum: [authorization_code, refresh_token, client_credentials]
        code:
          type: string
          example: "7awdXwZoedakjad37a"
        refresh_token:
          type: string
          example: "7awdXwZoedakjad37a"
        scope:
          type: string
          description: Space-delimited list of scopes to request. For client_credentials grant only. If omitted, all scopes allowed by the client are granted.
          example: "companies:read events:read"

    OAuthToken:
      type: object
      properties:
        token_type:
          type: string
          example: "Bearer"
        expires_at:
          type: string
          format: date-time
          example: "2020-08-24T14:15:22Z"
        access_token:
          type: string
          example: "7awdXwZoedakjad37a7awdXwZoedakjad37a7awdXwZoedakjad37a"
        refresh_token:
          type: string
          example: "7awdXwZoedakjad37a7awdXwZoedakjad37a"
        scope:
          type: string
          description: Space-delimited list of scopes granted by this token (RFC 6749 §5.1).
          example: "user:read companies:read"

    OAuthPublicKey:
      type: object
      description: Public key in the JWK format to validate the JWT signature of ID tokens.
      required:
        - kty
        - use
        - kid
        - "n"
        - e
        - alg
      properties:
        kty:
          type: string
          example: "RSA"
        use:
          type: string
          example: "sig"
        kid:
          type: string
          example: "1"
        "n":
          type: string
          description: "base64-encoded-modulus"
        e:
          type: string
          description: "base64-encoded-exponent"
        alg:
          type: string
          example: "RS256"

