          type: string
          description: Unique identifier for this tier.
          example: "tier_abc123"
        name:
          type: string
          example: "Floor"
        name_translations:
          $ref: "#/components/schemas/TranslationMap"
        description:
          type: string
          example: "Standing area near the stage"
        description_translations:
          $ref: "#/components/schemas/TranslationMap"
        max_capacity:
          type: integer
          format: int32
          example: 300
          description: Maximum number of guests for this tier.
        min_group_size:
          type: integer
          format: int32
          example: 1
          description: Minimum guests per booking.
        max_group_size:
          type: integer
          format: int32
          example: 4
          description: Maximum guests per booking.
        currency:
          type: string
          example: "USD"
        variations:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledEventVariationResponse"
        marketplace_visible:
          type: boolean
          example: true
          description: Whether this tier is available for online bookings.
        payment_settings:
          $ref: "#/components/schemas/PaymentSettings"
        confirmation_message:
          type: string
          example: "Thanks for booking! Please arrive 15 minutes early."
